<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Maddie's Gymnastics Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffd7ec">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
  body {
    font-family: ui-rounded, -apple-system, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    background:#ffd7ec;
    touch-action:none;
    user-select:none; -webkit-user-select:none;
    position:fixed; inset:0;
  }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }

  #topbar {
    position:fixed; top:calc(env(safe-area-inset-top, 0px) + 10px);
    left:0; right:0; display:flex; justify-content:space-between; align-items:center;
    padding:0 12px; pointer-events:none; z-index:5; gap:8px;
  }
  .pill {
    background:rgba(255,255,255,.85); backdrop-filter:blur(4px);
    border-radius:999px; padding:8px 14px; font-weight:800; font-size:17px;
    color:#a12468; box-shadow:0 2px 8px rgba(120,40,90,.18);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
  }
  .btn {
    pointer-events:auto; border:none; cursor:pointer;
    background:rgba(255,255,255,.85); backdrop-filter:blur(4px);
    border-radius:999px; width:44px; height:44px; font-size:22px;
    box-shadow:0 2px 8px rgba(120,40,90,.18);
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .btn:active { transform:scale(.92); }
  .hidden { display:none !important; }

  /* ---------- menu ---------- */
  #menu {
    position:fixed; inset:0; z-index:10;
    background:linear-gradient(160deg,#ffe3f2 0%,#ffd0e8 40%,#e6d4ff 75%,#cfe0ff 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:14px; padding:24px; transition:opacity .5s ease;
  }
  #menu h1 {
    font-size:clamp(30px,9vw,46px); line-height:1.06; color:#c2186f;
    text-shadow:0 3px 0 #ffffffb0, 0 8px 22px rgba(190,30,110,.25);
    letter-spacing:-.5px;
  }
  #menu .flag { font-size:clamp(46px,15vw,74px); filter:drop-shadow(0 6px 10px rgba(160,40,100,.3)); animation:bounce 2.4s ease-in-out infinite; }
  @keyframes bounce { 0%,100%{transform:translateY(0) rotate(-4deg)} 50%{transform:translateY(-12px) rotate(5deg)} }
  #menu .how {
    background:rgba(255,255,255,.7); border-radius:18px; padding:10px 16px;
    color:#8c3a6b; font-weight:700; font-size:15px; line-height:1.55; max-width:340px;
  }
  #menu .events { display:flex; flex-direction:column; gap:12px; width:min(320px,86vw); margin-top:4px; }
  #menu .event {
    border:none; cursor:pointer; border-radius:22px; padding:16px 18px;
    font-size:21px; font-weight:900; font-family:inherit; color:#fff; text-align:left;
    display:flex; align-items:center; gap:12px;
    box-shadow:0 6px 0 rgba(0,0,0,.14), 0 10px 22px rgba(160,40,100,.25);
  }
  #menu .event:active { transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.14); }
  #menu .event small { display:block; font-size:12.5px; font-weight:700; opacity:.9; }
  #evFloor { background:linear-gradient(135deg,#4f7df9,#7a5cf0); }
  #evBeam  { background:linear-gradient(135deg,#f08c2e,#e2589b); }
  #evVault { background:linear-gradient(135deg,#19b8a6,#2f8fe8); }
  #menu .event .ic { font-size:30px; }

  /* ---------- score panel ---------- */
  #panel {
    position:fixed; inset:0; z-index:9; display:flex; align-items:center; justify-content:center;
    background:rgba(60,10,50,.28); backdrop-filter:blur(2px); padding:20px;
    opacity:0; pointer-events:none; transition:opacity .45s ease;
  }
  #panel.show { opacity:1; pointer-events:auto; }
  #panel .card {
    background:linear-gradient(175deg,#fffdf6,#ffeef8);
    border-radius:28px; padding:24px 26px 20px; width:min(340px,90vw); text-align:center;
    box-shadow:0 18px 50px rgba(90,20,70,.4);
    transform:translateY(24px) scale(.94); transition:transform .45s cubic-bezier(.2,1.4,.4,1);
  }
  #panel.show .card { transform:translateY(0) scale(1); }
  #panelTitle { font-size:22px; font-weight:900; color:#c2186f; }
  #starsRow { font-size:36px; letter-spacing:6px; margin:6px 0 2px; }
  #starsRow .off { opacity:.22; filter:grayscale(1); }
  #bigScore { font-size:56px; font-weight:900; color:#5a34c8; line-height:1.1; text-shadow:0 3px 0 #fff; }
  #scoreLabel { font-size:13px; font-weight:800; color:#b06fa0; letter-spacing:2px; }
  #bestTrick { margin-top:10px; font-size:16px; font-weight:800; color:#1f4fd8; background:#eaf0ff; border-radius:14px; padding:8px 10px; }
  #bestScore { margin-top:7px; font-size:14px; font-weight:800; color:#a12468; }
  #tip { margin-top:9px; font-size:13.5px; font-weight:700; color:#8c6a2a; background:#fff3d0; border-radius:14px; padding:8px 10px; }
  #panel .row { display:flex; gap:10px; margin-top:15px; }
  #panel .row button {
    flex:1; border:none; cursor:pointer; border-radius:16px; padding:13px 8px;
    font-size:16.5px; font-weight:900; font-family:inherit; color:#fff;
    box-shadow:0 4px 0 rgba(0,0,0,.15);
  }
  #panel .row button:active { transform:translateY(2px); box-shadow:0 2px 0 rgba(0,0,0,.15); }
  #againBtn { background:linear-gradient(135deg,#ff4f9a,#c2186f); }
  #menuBtn2 { background:linear-gradient(135deg,#8a63f2,#5a34c8); }

  /* ---------- hints ---------- */
  #toast {
    position:fixed; left:50%; top:26%; transform:translate(-50%,0) scale(.9);
    background:rgba(255,255,255,.92); color:#a12468; font-weight:900; font-size:18px;
    border-radius:999px; padding:12px 22px; box-shadow:0 6px 20px rgba(140,30,90,.3);
    z-index:6; opacity:0; transition:opacity .3s, transform .3s; pointer-events:none;
    text-align:center; max-width:86vw;
  }
  #toast.show { opacity:1; transform:translate(-50%,0) scale(1); }
  #legend {
    position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 12px);
    left:0; right:0; display:flex; justify-content:center; gap:7px; flex-wrap:wrap;
    z-index:5; pointer-events:none; padding:0 10px;
  }
  #legend span {
    background:rgba(255,255,255,.78); border-radius:999px; padding:5px 11px;
    font-size:12.5px; font-weight:800; color:#8c3a6b; box-shadow:0 2px 6px rgba(120,40,90,.15);
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>

<div id="topbar" class="hidden">
  <button class="btn" id="backBtn">🏠</button>
  <div class="pill" id="evPill">Floor Routine</div>
  <div style="display:flex;gap:8px;align-items:center;">
    <div class="pill" id="bestPill">🏆 0</div>
    <button class="btn" id="muteBtn">🔊</button>
  </div>
</div>

<div id="legend" class="hidden">
  <span>➰ loop = Flip</span><span>〽️ zigzag = Handsprings</span><span>∟ corner = Cartwheel</span><span>◠ curve = Aerial</span>
</div>

<div id="toast"></div>

<div id="menu">
  <div class="flag">🤸‍♀️</div>
  <h1>Maddie's<br>Gymnastics Game</h1>
  <div class="how">Draw a path with your finger and <b>Maddie performs it!</b><br>➰ loops = flips &nbsp;·&nbsp; 〽️ zigzags = handsprings<br>Crazier routine = bigger score! ⭐</div>
  <div class="events">
    <button class="event" id="evFloor"><span class="ic">🟦</span><span>Floor Routine<small>Fill the floor with tricks!</small></span></button>
    <button class="event" id="evBeam"><span class="ic">🪵</span><span>Balance Beam<small>Stay steady on the beam!</small></span></button>
    <button class="event" id="evVault"><span class="ic">🐎</span><span>Vault<small>Run, spring &amp; fly!</small></span></button>
  </div>
</div>

<div id="panel">
  <div class="card">
    <div id="panelTitle">✨ Beautiful Routine! ✨</div>
    <div id="starsRow"></div>
    <div id="bigScore">0</div>
    <div id="scoreLabel">TOTAL SCORE</div>
    <div id="bestTrick"></div>
    <div id="bestScore"></div>
    <div id="tip" class="hidden"></div>
    <div class="row">
      <button id="againBtn">🔁 Again!</button>
      <button id="menuBtn2">🏟️ Events</button>
    </div>
  </div>
</div>

<script>
"use strict";
/* ================= Maddie's Gymnastics Game =================
   Trace a routine with your finger; Maddie the gymnast replays
   it, turning loops into flips, zigzags into handsprings, and
   corners into cartwheels. Confetti + score at the end. */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;

const TAU = Math.PI * 2, D = Math.PI / 180;
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const lerp = (a, b, t) => a + (b - a) * t;
const dist = (a, b) => Math.hypot(b.x - a.x, b.y - a.y);
const easeOut = t => 1 - (1 - t) * (1 - t);

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.5);
  W = window.innerWidth; H = window.innerHeight;
  cv.width = W * DPR; cv.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  if (EV) EV.setup();
}
window.addEventListener('resize', resize);

/* ---------------- sound ---------------- */
let AC = null, muted = localStorage.getItem('maddie-muted') === '1';
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
  if (AC && AC.state === 'suspended') AC.resume();
}
function blip(freq, dur = .14, type = 'sine', vol = .18, delay = 0) {
  if (muted || !AC) return;
  try {
    const t0 = AC.currentTime + delay;
    const o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t0);
    o.frequency.exponentialRampToValueAtTime(freq * 1.35, t0 + dur);
    g.gain.setValueAtTime(vol, t0);
    g.gain.exponentialRampToValueAtTime(.001, t0 + dur);
    o.connect(g).connect(AC.destination);
    o.start(t0); o.stop(t0 + dur + .02);
  } catch (e) {}
}
function fanfare() { [523, 659, 784, 1047, 1319].forEach((f, i) => blip(f, .3, 'triangle', .16, i * .12)); }
function buzz(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

/* ---------------- moves catalog ---------------- */
const MOVES = {
  backflip:  { label: 'Backflip!',           pts: 150, minDur: .8  },
  frontflip: { label: 'Front Flip!',         pts: 150, minDur: .8  },
  layout:    { label: 'Big Layout Flip!',    pts: 220, minDur: .9  },
  double:    { label: 'DOUBLE FLIP!!',       pts: 420, minDur: 1.25 },
  triple:    { label: 'TRIPLE FLIP!!!',      pts: 750, minDur: 1.6 },
  cartwheel: { label: 'Cartwheel!',          pts: 60,  minDur: .75 },
  fhs:       { label: 'Front Handspring!',   pts: 90,  minDur: .8  },
  bhs:       { label: 'Back Handspring!',    pts: 110, minDur: .8  },
  series:    { label: 'Handspring Series!',  pts: 90,  minDur: .55 }, // pts × count
  aerial:    { label: 'Aerial!',             pts: 130, minDur: .85 },
  leap:      { label: 'Split Leap!',         pts: 50,  minDur: .7  },
};

/* ---------------- events (arenas) ---------------- */
const topSafe = () => 70 + 10;
const EVENTS = {
  floor: {
    id: 'floor', name: 'Floor Routine',
    setup() {
      const m = 14, top = topSafe() + 14, bot = 64;
      const size = Math.min(W - m * 2, H - top - bot);
      this.rect = { x: (W - size) / 2, y: top + Math.max(0, (H - top - bot - size) / 2), w: size, h: size };
    },
    clampPt(x, y) {
      const r = this.rect, p = 8;
      return { x: clamp(x, r.x + p, r.x + r.w - p), y: clamp(y, r.y + p, r.y + r.h - p) };
    },
    startHint() { const r = this.rect; return { x: r.x + r.w * .16, y: r.y + r.h * .84 }; },
    draw(t) {
      const r = this.rect;
      // spring floor
      rounded(r.x, r.y, r.w, r.h, 20); ctx.fillStyle = '#8db4ea'; ctx.fill();
      const g = ctx.createLinearGradient(r.x, r.y, r.x + r.w, r.y + r.h);
      g.addColorStop(0, 'rgba(255,255,255,.20)'); g.addColorStop(1, 'rgba(40,70,150,.16)');
      rounded(r.x, r.y, r.w, r.h, 20); ctx.fillStyle = g; ctx.fill();
      // boundary line
      rounded(r.x + 12, r.y + 12, r.w - 24, r.h - 24, 12);
      ctx.strokeStyle = 'rgba(255,255,255,.92)'; ctx.lineWidth = 3; ctx.stroke();
      // diagonal tumble guides
      ctx.strokeStyle = 'rgba(255,255,255,.18)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(r.x + 24, r.y + r.h - 24); ctx.lineTo(r.x + r.w - 24, r.y + 24);
      ctx.moveTo(r.x + 24, r.y + 24); ctx.lineTo(r.x + r.w - 24, r.y + r.h - 24); ctx.stroke();
    }
  },
  beam: {
    id: 'beam', name: 'Balance Beam',
    setup() {
      this.cx = W / 2;
      this.y0 = topSafe() + 26; this.y1 = H - 70;
      this.halfW = 15; this.slack = 78;
    },
    clampPt(x, y) {
      return { x: clamp(x, this.cx - this.slack, this.cx + this.slack), y: clamp(y, this.y0, this.y1) };
    },
    startHint() { return { x: this.cx, y: this.y1 - 24 }; },
    onBeam(x) { return Math.abs(x - this.cx) <= this.halfW + 12; },
    draw(t) {
      // mats
      rounded(this.cx - this.slack - 26, this.y0 - 18, (this.slack + 26) * 2, this.y1 - this.y0 + 44, 18);
      ctx.fillStyle = '#9ec3ee'; ctx.fill();
      // legs
      ctx.fillStyle = '#a8763e';
      [.22, .78].forEach(f => {
        const y = lerp(this.y0, this.y1, f);
        ctx.beginPath();
        ctx.moveTo(this.cx - 34, y + 14); ctx.lineTo(this.cx + 34, y + 14);
        ctx.lineTo(this.cx + 22, y - 4); ctx.lineTo(this.cx - 22, y - 4); ctx.closePath(); ctx.fill();
      });
      // beam
      rounded(this.cx - this.halfW, this.y0, this.halfW * 2, this.y1 - this.y0, 10);
      ctx.fillStyle = '#e6bd83'; ctx.fill();
      rounded(this.cx - this.halfW + 4, this.y0 + 4, 7, this.y1 - this.y0 - 8, 4);
      ctx.fillStyle = 'rgba(255,255,255,.35)'; ctx.fill();
      rounded(this.cx - this.halfW, this.y0, this.halfW * 2, this.y1 - this.y0, 10);
      ctx.strokeStyle = 'rgba(120,75,30,.5)'; ctx.lineWidth = 2; ctx.stroke();
    }
  },
  vault: {
    id: 'vault', name: 'Vault',
    setup() {
      this.cx = W / 2;
      this.runW = 46;
      this.y1 = H - 70;                    // runway start (bottom)
      this.tableY = topSafe() + H * .17;   // vault table
      this.y0 = topSafe() + 46;            // top of landing zone
      this.slack = Math.min(W / 2 - 12, 150);
    },
    clampPt(x, y) {
      return { x: clamp(x, this.cx - this.slack, this.cx + this.slack), y: clamp(y, this.y0, this.y1) };
    },
    startHint() { return { x: this.cx, y: this.y1 - 22 }; },
    draw(t) {
      // landing mat
      rounded(this.cx - this.slack - 8, this.y0 - 8, (this.slack + 8) * 2, this.tableY - this.y0 + 30, 18);
      ctx.fillStyle = '#8db4ea'; ctx.fill();
      rounded(this.cx - this.slack + 6, this.y0 + 6, (this.slack - 6) * 2, this.tableY - this.y0 + 2, 12);
      ctx.strokeStyle = 'rgba(255,255,255,.8)'; ctx.lineWidth = 3; ctx.stroke();
      // runway
      rounded(this.cx - this.runW / 2, this.tableY + 34, this.runW, this.y1 - this.tableY - 24, 12);
      ctx.fillStyle = '#c9dcf7'; ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,.9)'; ctx.lineWidth = 2; ctx.stroke();
      // springboard
      rounded(this.cx - 26, this.tableY + 40, 52, 26, 8);
      ctx.fillStyle = '#e2589b'; ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,.55)';
      for (let i = 0; i < 3; i++) rounded(this.cx - 18, this.tableY + 45 + i * 6, 36, 3, 2), ctx.fill();
      // vault table
      rounded(this.cx - 40, this.tableY - 2, 80, 34, 16);
      ctx.fillStyle = '#e6bd83'; ctx.fill();
      rounded(this.cx - 40, this.tableY - 2, 80, 34, 16);
      ctx.strokeStyle = 'rgba(120,75,30,.5)'; ctx.lineWidth = 2; ctx.stroke();
      ctx.fillStyle = 'rgba(255,255,255,.4)';
      rounded(this.cx - 30, this.tableY + 3, 60, 8, 4); ctx.fill();
    }
  }
};

/* ---------------- state ---------------- */
let state = 'menu';   // menu | trace | replay | score
let EV = null;
let raw = [];         // raw trace points
let drawing = false, activePointer = null;
let P = [], S = [];   // resampled points + cumulative arc length
let moves = [], segs = [], stars = [], popups = [], confetti = [], sparks = [];
let replayT0 = 0, replayDone = false, doneAt = 0;
let score = 0, combo = 0, starCount = 0, bestTrickLabel = '', bestTrickPts = 0;
let steadyFrac = 1, airS = -1;
let time = 0;
let lastFacing = 1;

const $ = id => document.getElementById(id);
const bestKey = () => 'maddie-best-' + EV.id;
const getBest = () => +(localStorage.getItem(bestKey()) || 0);

function toast(msg, ms = 1800) {
  const t = $('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._h); t._h = setTimeout(() => t.classList.remove('show'), ms);
}

/* ---------------- flow ---------------- */
function goMenu() {
  state = 'menu';
  $('menu').classList.remove('hidden'); $('menu').style.opacity = 1;
  $('topbar').classList.add('hidden'); $('legend').classList.add('hidden');
  $('panel').classList.remove('show');
}
function startEvent(id) {
  audio();
  EV = EVENTS[id]; EV.setup();
  $('menu').style.opacity = 0;
  setTimeout(() => $('menu').classList.add('hidden'), 450);
  $('topbar').classList.remove('hidden'); $('legend').classList.remove('hidden');
  $('evPill').textContent = EV.name;
  $('bestPill').textContent = '🏆 ' + getBest();
  $('panel').classList.remove('show');
  startTrace();
  blip(660, .2, 'triangle');
  const hints = {
    floor: 'Draw Maddie’s floor routine! ➰ = flip',
    beam: 'Trace along the beam — stay steady!',
    vault: 'Run up the runway, then go wild! 🚀'
  };
  toast(hints[id], 2400);
}
function startTrace() {
  state = 'trace';
  raw = []; P = []; moves = []; segs = []; stars = []; popups = []; sparks = []; confetti = [];
  drawing = false; activePointer = null; replayDone = false;
  score = 0; combo = 0; starCount = 0; bestTrickLabel = ''; bestTrickPts = 0;
  steadyFrac = 1; airS = -1;
  $('panel').classList.remove('show');
}

/* ---------------- input ---------------- */
cv.addEventListener('pointerdown', e => {
  audio();
  if (state !== 'trace' || activePointer !== null) return;
  activePointer = e.pointerId; drawing = true;
  raw = [EV.clampPt(e.clientX, e.clientY)];
  try { cv.setPointerCapture(e.pointerId); } catch (err) {}
});
cv.addEventListener('pointermove', e => {
  if (!drawing || e.pointerId !== activePointer) return;
  const p = EV.clampPt(e.clientX, e.clientY);
  const last = raw[raw.length - 1];
  if (dist(p, last) >= 3) raw.push(p);
});
function endStroke(e) {
  if (!drawing || e.pointerId !== activePointer) return;
  drawing = false; activePointer = null;
  let len = 0;
  for (let i = 1; i < raw.length; i++) len += dist(raw[i - 1], raw[i]);
  if (len < 110) {
    raw = [];
    toast('Draw a bigger routine! Try loops ➰ and zigzags 〽️');
    blip(300, .18, 'sine', .12);
    return;
  }
  beginReplay();
}
cv.addEventListener('pointerup', endStroke);
cv.addEventListener('pointercancel', endStroke);

$('backBtn').addEventListener('click', () => { blip(500, .12); goMenu(); });
$('muteBtn').addEventListener('click', () => {
  muted = !muted; localStorage.setItem('maddie-muted', muted ? '1' : '0');
  $('muteBtn').textContent = muted ? '🔇' : '🔊';
});
$('muteBtn').textContent = muted ? '🔇' : '🔊';
$('againBtn').addEventListener('click', () => { blip(660, .15, 'triangle'); startTrace(); });
$('menuBtn2').addEventListener('click', () => { blip(500, .12); goMenu(); });
['evFloor', 'evBeam', 'evVault'].forEach(id => {
  $(id).addEventListener('click', () => startEvent(id.slice(2).toLowerCase()));
});

/* ---------------- path analysis ---------------- */
function resample(pts, step) {
  const out = [{ x: pts[0].x, y: pts[0].y }];
  let prev = pts[0], acc = 0;
  for (let i = 1; i < pts.length; i++) {
    let cur = pts[i], d = dist(prev, cur);
    while (acc + d >= step) {
      const r = (step - acc) / d;
      prev = { x: prev.x + (cur.x - prev.x) * r, y: prev.y + (cur.y - prev.y) * r };
      out.push(prev);
      d = dist(prev, cur); acc = 0;
    }
    acc += d; prev = cur;
  }
  return out;
}
function segHit(a, b, c, d) {
  const rx = b.x - a.x, ry = b.y - a.y, sx = d.x - c.x, sy = d.y - c.y;
  const den = rx * sy - ry * sx;
  if (Math.abs(den) < 1e-9) return false;
  const t = ((c.x - a.x) * sy - (c.y - a.y) * sx) / den;
  const u = ((c.x - a.x) * ry - (c.y - a.y) * rx) / den;
  return t > 0 && t < 1 && u > 0 && u < 1;
}
function normAng(a) { while (a > Math.PI) a -= TAU; while (a < -Math.PI) a += TAU; return a; }

function analyze() {
  const STEP = 7;
  P = resample(raw, STEP);
  const n = P.length;
  S = [0];
  for (let i = 1; i < n; i++) S[i] = S[i - 1] + dist(P[i - 1], P[i]);

  const ang = [], turn = [];
  for (let i = 0; i < n - 1; i++) ang[i] = Math.atan2(P[i + 1].y - P[i].y, P[i + 1].x - P[i].x);
  turn[0] = 0;
  for (let i = 1; i < n - 1; i++) turn[i] = normAng(ang[i] - ang[i - 1]);

  moves = [];

  /* --- loops (self intersections) → flips --- */
  const cum = [0];
  for (let i = 1; i < n - 1; i++) cum[i] = cum[i - 1] + turn[i];
  cum[n - 1] = cum[n - 2] || 0;
  const cands = [];
  for (let i = 0; i < n - 2; i++) {
    for (let j = i + 3; j < n - 1; j++) {
      const per = S[j] - S[i];
      if (per <= 42 || per >= 620) continue;
      if (segHit(P[i], P[i + 1], P[j], P[j + 1])) {
        cands.push({ i0: i, i1: j + 1, per });
      } else if (dist(P[i], P[j]) < 14 && Math.abs(cum[j] - cum[i]) > 300 * D) {
        // loop that closes back on itself without strictly crossing
        cands.push({ i0: i, i1: j, per });
      }
    }
  }
  cands.sort((a, b) => a.per - b.per);
  const loops = [];
  for (const c of cands) {
    if (loops.every(l => c.i1 <= l.i0 || c.i0 >= l.i1)) loops.push(c);
  }
  loops.sort((a, b) => a.i0 - b.i0);
  // merge tight chains of loops into multi-flips
  const merged = [];
  for (const l of loops) {
    // signed area → spin direction
    let area = 0;
    for (let k = l.i0; k < l.i1; k++) {
      const a = P[k], b = P[k + 1 < n ? k + 1 : k];
      area += a.x * b.y - b.x * a.y;
    }
    l.spin = area > 0 ? 1 : -1;
    l.count = 1;
    const last = merged[merged.length - 1];
    if (last && S[l.i0] - S[last.i1] < 80) { last.i1 = l.i1; last.count++; last.per += l.per; }
    else merged.push(l);
  }
  for (const l of merged) {
    let type;
    if (l.count >= 3) type = 'triple';
    else if (l.count === 2) type = 'double';
    else if (l.per > 260) type = 'layout';
    else type = l.spin > 0 ? 'frontflip' : 'backflip';
    moves.push({ type, i0: l.i0, i1: l.i1, spin: l.spin, count: l.count });
  }

  const inLoop = i => merged.some(l => i >= l.i0 - 2 && i <= l.i1 + 2);

  /* --- corners → cartwheels / zigzags → handsprings --- */
  const wTurn = [];
  for (let i = 0; i < n - 1; i++) {
    let s = 0;
    for (let k = Math.max(1, i - 2); k <= Math.min(n - 2, i + 2); k++) s += turn[k];
    wTurn[i] = s;
  }
  const corners = [];
  for (let i = 2; i < n - 3; i++) {
    if (inLoop(i)) continue;
    const a = Math.abs(wTurn[i]);
    if (a > 72 * D && a >= Math.abs(wTurn[i - 1]) && a > Math.abs(wTurn[i + 1])) {
      if (!corners.length || i - corners[corners.length - 1].i >= 5) {
        corners.push({ i, sign: Math.sign(wTurn[i]) });
      }
    }
  }
  // group alternating corners into zigzags
  let g = [];
  const flushGroup = () => {
    if (!g.length) return;
    const i0 = Math.max(0, g[0].i - 3), i1 = Math.min(n - 1, g[g.length - 1].i + 3);
    const k = g.length;
    let type = k === 1 ? 'cartwheel' : k === 2 ? 'fhs' : k === 3 ? 'bhs' : 'series';
    moves.push({ type, i0, i1, count: k, spin: g[0].sign >= 0 ? 1 : -1 });
    g = [];
  };
  for (const c of corners) {
    const last = g[g.length - 1];
    if (last && c.sign !== last.sign && S[c.i] - S[last.i] < 160) g.push(c);
    else { flushGroup(); g = [c]; }
  }
  flushGroup();

  /* --- sustained smooth curves → aerials --- */
  moves.sort((a, b) => a.i0 - b.i0);
  const covered = i => moves.some(m => i >= m.i0 - 2 && i <= m.i1 + 2);
  let i = 1;
  while (i < n - 2) {
    if (covered(i) || Math.abs(turn[i]) < 1.5 * D) { i++; continue; }
    const sgn = Math.sign(turn[i]);
    let acc = 0, j = i;
    while (j < n - 2 && !covered(j) && (Math.sign(turn[j]) === sgn || Math.abs(turn[j]) < 2.5 * D)) {
      acc += turn[j]; j++;
    }
    if (Math.abs(acc) > 115 * D && S[j] - S[i] > 55) {
      moves.push({ type: 'aerial', i0: i, i1: j, spin: sgn, count: 1 });
      i = j + 3;
    } else i = j + 1;
  }

  /* --- long straights → split leaps --- */
  moves.sort((a, b) => a.i0 - b.i0);
  const gaps = [];
  let cur = 0;
  for (const m of moves) { if (m.i0 > cur) gaps.push([cur, m.i0]); cur = Math.max(cur, m.i1); }
  if (cur < n - 1) gaps.push([cur, n - 1]);
  for (const [a, b] of gaps) {
    const len = S[b] - S[a];
    if (len < 230) continue;
    let tt = 0;
    for (let k = a + 1; k < b - 1; k++) tt += Math.abs(turn[k]);
    if (tt < len / 230 * 60 * D) {
      const midS = (S[a] + S[b]) / 2;
      const i0 = idxAtS(midS - 55), i1 = idxAtS(midS + 55);
      moves.push({ type: 'leap', i0, i1, spin: 1, count: 1 });
    }
  }

  /* --- resolve overlaps --- */
  moves.sort((a, b) => a.i0 - b.i0);
  const clean = [];
  let end = 0;
  for (const m of moves) {
    if (m.i0 < end) {
      if (m.i1 - end > 6) m.i0 = end; else continue;
    }
    if (m.i1 <= m.i0) continue;
    clean.push(m); end = m.i1;
  }
  moves = clean;

  /* --- event extras --- */
  if (EV.id === 'beam') {
    let on = 0;
    for (const p of P) if (EV.onBeam(p.x)) on++;
    steadyFrac = on / n;
  }
  if (EV.id === 'vault') {
    airS = -1;
    for (let k = 0; k < n; k++) if (P[k].y < EV.tableY + 34) { airS = S[k]; break; }
  }

  buildTimeline();
  placeStars();
}

function idxAtS(s) {
  let lo = 0, hi = S.length - 1;
  while (lo < hi) { const mid = (lo + hi) >> 1; if (S[mid] < s) lo = mid + 1; else hi = mid; }
  return lo;
}

function buildTimeline() {
  const scl = charScale();
  const SPEED = 250 * scl;
  segs = [];
  let t = 0, cur = 0;
  segs.push({ type: 'salute', i0: 0, i1: 0, t0: t, t1: t + .8 }); t += .8;
  const pushRun = (a, b) => {
    if (b <= a) return;
    const dur = Math.max(.06, (S[b] - S[a]) / SPEED);
    segs.push({ type: 'run', i0: a, i1: b, t0: t, t1: t + dur }); t += dur;
  };
  for (const m of moves) {
    pushRun(cur, m.i0);
    const base = MOVES[m.type].minDur * (m.type === 'series' ? m.count : 1);
    const dur = Math.max(base, (S[m.i1] - S[m.i0]) / (SPEED * 1.3));
    segs.push({ type: 'move', mv: m, i0: m.i0, i1: m.i1, t0: t, t1: t + dur }); t += dur;
    cur = m.i1;
  }
  pushRun(cur, P.length - 1);
  segs.push({ type: 'finish', i0: P.length - 1, i1: P.length - 1, t0: t, t1: t + 1.5 });
}

function placeStars() {
  stars = [];
  for (const sg of segs) {
    if (sg.type === 'run') {
      const len = S[sg.i1] - S[sg.i0];
      const k = Math.floor(len / 190);
      for (let j = 1; j <= k; j++) {
        const s = S[sg.i0] + len * j / (k + 1);
        const p = P[idxAtS(s)];
        stars.push({ s, x: p.x, y: p.y, got: false });
      }
    } else if (sg.type === 'move') {
      const s = (S[sg.i0] + S[sg.i1]) / 2;
      const p = P[idxAtS(s)];
      stars.push({ s, x: p.x, y: p.y, got: false });
    }
  }
}

/* ---------------- replay ---------------- */
function beginReplay() {
  analyze();
  state = 'replay';
  replayT0 = performance.now();

function moveScore(m) {
  const def = MOVES[m.type];
  let pts = def.pts * (m.type === 'series' ? m.count : 1);
  if (EV.id === 'vault' && airS >= 0 && S[m.i0] >= airS) pts = Math.round(pts * 1.5);
  const mult = Math.min(1 + combo * .25, 3);
  return Math.round(pts * mult / 5) * 5;
}

function triggerMove(sg, x, y) {
  const m = sg.mv, def = MOVES[m.type];
  const pts = moveScore(m);
  score += pts;
  combo++;
  let label = def.label;
  if (m.type === 'series') label = m.count + '× Handsprings!';
  if (EV.id === 'vault' && airS >= 0 && S[m.i0] >= airS) label += ' ✈️';
  if (pts > bestTrickPts) { bestTrickPts = pts; bestTrickLabel = label; }
  const multTxt = combo > 1 ? '  ×' + Math.min(1 + (combo - 1) * .25, 3).toFixed(2).replace(/\.?0+$/, '') : '';

  const recent = popups.filter(p => time - p.t0 < 1.2 && Math.abs(p.x - x) < 120 && Math.abs(p.y - (y - 46)) < 90).length;

  blip(560 + Math.min(combo, 8) * 70, .18, 'triangle', .2);
  blip(840 + Math.min(combo, 8) * 70, .22, 'sine', .12, .07);
  buzz(24);
  for (let k = 0; k < 12; k++) sparks.push(newSpark(x, y));
}

function newSpark(x, y) {
  const a = Math.random() * TAU, sp = 40 + Math.random() * 140;
  return { x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 60, t0: time, life: .5 + Math.random() * .4, c: ['#fff', '#ffd94f', '#ff8ac2', '#8ab8ff'][Math.floor(Math.random() * 4)] };
}

function endRoutine() {
  if (replayDone) return;
  replayDone = true; doneAt = time;
  // bonuses
  let wild = 0;
  for (let i = 1; i < P.length - 1; i++) {
    wild += Math.abs(normAng(Math.atan2(P[i + 1].y - P[i].y, P[i + 1].x - P[i].x) - Math.atan2(P[i].y - P[i - 1].y, P[i].x - P[i - 1].x)));
  }
  const wildBonus = Math.min(300, Math.round(wild / TAU * 40 / 5) * 5);
  if (wildBonus >= 20) {
    score += wildBonus;
    popups.push({ x: W / 2, y: H * .34, txt: 'Wild Routine Bonus!', sub: '+' + wildBonus, t0: time + .1, big: false });
  }
  if (EV.id === 'beam') {
    const sb = Math.round(steadyFrac * 200 / 5) * 5;
    score += sb;
    popups.push({ x: W / 2, y: H * .42, txt: steadyFrac > .8 ? 'So Steady! 🧘‍♀️' : 'Steady Bonus', sub: '+' + sb, t0: time + .35, big: false });
  }
  spawnConfetti();
  fanfare();
  buzz([30, 40, 30]);
  setTimeout(showPanel, 1400);
}

function showPanel() {
  state = 'score';
  const best = getBest();
  if (score > best) localStorage.setItem(bestKey(), score);
  $('bestPill').textContent = '🏆 ' + Math.max(best, score);
  $('panelTitle').textContent = score > best && best > 0 ? '🎉 NEW BEST! 🎉' : '✨ Beautiful Routine! ✨';
  const s3 = score >= 1400 ? 3 : score >= 700 ? 2 : score >= 250 ? 1 : 0;
  $('starsRow').innerHTML = [0, 1, 2].map(i => `<span class="${i < s3 ? '' : 'off'}">⭐</span>`).join('');
  $('bestTrick').textContent = bestTrickLabel ? '🥇 Best trick: ' + bestTrickLabel : '🥇 Try a loop ➰ for a flip!';
  $('bestScore').textContent = '🏆 Best score: ' + Math.max(best, score);
  const tip = $('tip');
  if (moves.length < 2) {
    tip.textContent = '💡 Tip: draw loops ➰, zigzags 〽️ and curvy lines for way more points!';
    tip.classList.remove('hidden');
  } else if (s3 === 3) {

    tip.classList.remove('hidden');

}

function spawnConfetti() {
  const end = P[P.length - 1];
  for (let i = 0; i < 170; i++) {
    const fromChar = i < 60;
    confetti.push({
      x: fromChar ? end.x : Math.random() * W,
      y: fromChar ? end.y - 40 : -20 - Math.random() * H * .5,
      vx: (Math.random() - .5) * (fromChar ? 340 : 60),
      vy: fromChar ? -140 - Math.random() * 260 : 40 + Math.random() * 60,

/* ================= rendering ================= */
function rounded(x, y, w, h, r) {
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function starPath(x, y, r, rot) {
  ctx.beginPath();
  for (let i = 0; i < 10; i++) {
    const rr = i % 2 ? r * .45 : r;
    const a = rot + i * Math.PI / 5 - Math.PI / 2;
    const px = x + Math.cos(a) * rr, py = y + Math.sin(a) * rr;
    i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.closePath();
}

function drawArena() {
  // gym hall backdrop
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#f6e3c8'); g.addColorStop(.5, '#eccfa4'); g.addColorStop(1, '#dfb883');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  // wooden planks
  ctx.strokeStyle = 'rgba(150,100,50,.14)'; ctx.lineWidth = 1.5;
  for (let y = 40; y < H; y += 46) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  // banner
  ctx.fillStyle = 'rgba(180,60,120,.16)';
  ctx.font = '800 15px ui-rounded, system-ui, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText("✦ MADDIE'S GYM ✦", W / 2, topSafe() + 4);
  EV.draw(time);
}

function drawTrail() {
  if (P.length > 1 || raw.length > 1) {
    const pts = state === 'trace' ? raw : P;
    if (pts.length > 1) {
      ctx.lineJoin = 'round'; ctx.lineCap = 'round';
      // glow
      ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
      for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
      ctx.strokeStyle = 'rgba(255,255,255,.65)'; ctx.lineWidth = 12; ctx.stroke();
      ctx.strokeStyle = '#ff5fa2'; ctx.lineWidth = 5; ctx.stroke();
      // glitter
      ctx.fillStyle = '#fff';
      for (let i = 0; i < pts.length; i += 6) {
        const tw = .4 + .6 * Math.abs(Math.sin(time * 5 + i));
        ctx.globalAlpha = tw * .9;
        ctx.beginPath(); ctx.arc(pts[i].x, pts[i].y, 1.6, 0, TAU); ctx.fill();
      }
      ctx.globalAlpha = 1;
    }
  }
}
function drawTrailProgress(s) {

  ctx.lineJoin = 'round'; ctx.lineCap = 'round';

function drawStars() {

function drawStartHint() {

/* ---------------- gymnast ---------------- */
const charScale = () => clamp(Math.min(W, H) / 400, .95, 1.5);
const SKIN = '#f2c19a', SKIN2 = '#d9a67e', HAIR = '#7a4a26', BLUE = '#1f4fd8', RED = '#e63946';

function basePose() {
  return { rot: 0, lift: 0, tor: 0, head: 0,
    aL1: -14 * D, aL2: -8 * D, aR1: 14 * D, aR2: 8 * D,
    lL1: -4 * D, lL2: 3 * D, lR1: 5 * D, lR2: 2 * D, snap: true };
}
function poseFor(sg, ph, s) {
  const p = basePose();
  const t = ph;
  switch (sg.type) {
    case 'salute': {
      const a = easeOut(clamp(t * 1.4, 0, 1));
      p.aL1 = lerp(-14 * D, -152 * D, a); p.aR1 = lerp(14 * D, 152 * D, a);
      p.aL2 = p.aR2 = 0; p.head = -8 * D * a;
      p.lift = Math.sin(Math.min(t * 1.4, 1) * Math.PI) * 4;
      break;
    }
    case 'finish': {
      const a = easeOut(clamp(t * 2, 0, 1));
      p.aL1 = -155 * D * a; p.aR1 = 155 * D * a; p.aL2 = p.aR2 = 0;
      p.head = -9 * D * a; p.lR1 = 28 * D * a; p.lR2 = 4 * D;
      p.tor = -4 * D * a;
      break;
    }
    case 'run': {
      const ph2 = s / 46;
      const sw = Math.sin(ph2 * TAU);
      p.lL1 = sw * 34 * D; p.lL2 = -clamp(-sw, 0, 1) * 72 * D;
      p.lR1 = -sw * 34 * D; p.lR2 = -clamp(sw, 0, 1) * 72 * D;
      p.aL1 = -sw * 30 * D + 4 * D; p.aL2 = 42 * D;
      p.aR1 = sw * 30 * D + 4 * D; p.aR2 = 42 * D;
      p.tor = 7 * D; p.lift = Math.abs(sw) * 2.5;
      break;
    }
    case 'move': return movePose(sg.mv, t);
    case 'wobble': {
      const w = Math.sin(time * 13);
      p.aL1 = -95 * D + w * 42 * D; p.aR1 = 95 * D - w * 42 * D;
      p.aL2 = p.aR2 = -10 * D;
      p.tor = w * 7 * D; p.head = -w * 6 * D;
      break;
    }
  }
  return p;
}
function movePose(m, t) {
  const p = basePose(); p.snap = false;
  const arc = Math.sin(Math.PI * t);
  const spinF = m.spin >= 0 ? 1 : -1;
  switch (m.type) {
    case 'backflip': case 'frontflip': {
      const dir = m.type === 'frontflip' ? 1 : -1;
      p.rot = dir * TAU * t;
      const k = clamp(arc * 1.6, 0, 1);
      p.lL1 = p.lR1 = 108 * D * k; p.lL2 = p.lR2 = -138 * D * k;
      p.aL1 = p.aR1 = 58 * D * k; p.aL2 = p.aR2 = 36 * D * k;
      p.head = 26 * D * k; p.tor = 14 * D * k;
      p.lift = arc * 46;
      break;
    }
    case 'layout': {
      p.rot = -TAU * t;
      p.aL1 = -176 * D; p.aR1 = 176 * D; p.aL2 = p.aR2 = 0;
      p.lL1 = -3 * D; p.lR1 = 5 * D; p.lL2 = p.lR2 = 0;
      p.lift = arc * 56;
      break;
    }
    case 'double': case 'triple': {
      const nrot = m.type === 'double' ? 2 : 3;
      p.rot = -TAU * nrot * t;
      const k = clamp(arc * 2.2, 0, 1);
      p.lL1 = p.lR1 = 112 * D * k; p.lL2 = p.lR2 = -142 * D * k;
      p.aL1 = p.aR1 = 60 * D * k; p.aL2 = p.aR2 = 40 * D * k;
      p.head = 28 * D * k; p.tor = 16 * D * k;
      p.lift = arc * (m.type === 'double' ? 58 : 68);
      break;
    }
    case 'cartwheel': {
      p.rot = TAU * t * spinF;
      p.aL1 = -142 * D; p.aR1 = 142 * D; p.aL2 = p.aR2 = 0;
      p.lL1 = -40 * D; p.lR1 = 40 * D; p.lL2 = p.lR2 = 0;
      p.lift = 10 + arc * 12;
      break;
    }
    case 'fhs': {
      p.rot = TAU * t;
      p.aL1 = -178 * D; p.aR1 = 178 * D; p.aL2 = p.aR2 = 0;
      p.lL1 = 16 * D * arc; p.lR1 = -14 * D * arc;
      p.lift = 12 + arc * 16;
      break;
    }
    case 'bhs': {
      p.rot = -TAU * t;
      p.aL1 = -174 * D; p.aR1 = 174 * D; p.aL2 = p.aR2 = 0;
      p.tor = -13 * D; p.lL1 = -8 * D; p.lR1 = 12 * D;
      p.lift = 12 + arc * 16;
      break;
    }
    case 'series': {
      const k = m.count;
      p.rot = -TAU * k * t;
      const bounce = Math.abs(Math.sin(Math.PI * k * t));
      p.aL1 = -174 * D; p.aR1 = 174 * D; p.aL2 = p.aR2 = 0;
      p.tor = -13 * D;
      p.lift = 8 + bounce * 20;
      break;
    }
    case 'aerial': {
      p.rot = TAU * t * spinF;
      p.lL1 = 78 * D; p.lL2 = 8 * D; p.lR1 = -74 * D; p.lR2 = -6 * D;
      p.aL1 = -26 * D; p.aR1 = 26 * D; p.aL2 = -22 * D; p.aR2 = 22 * D;
      p.lift = 14 + arc * 26;
      break;
    }
    case 'leap': {
      const sp = arc;
      p.lL1 = 84 * D * sp; p.lL2 = 4 * D; p.lR1 = -76 * D * sp; p.lR2 = -6 * D;
      p.aL1 = -96 * D * sp - 10 * D; p.aR1 = 96 * D * sp + 10 * D;
      p.aL2 = -14 * D; p.aR2 = 14 * D;
      p.head = -6 * D; p.lift = sp * 38;
      break;
    }
  }
  return p;
}

function drawGymnast(x, groundY, pose, facing, scl) {
  const TOR = 25 * scl, SHW = 7.5 * scl, HIPW = 5.5 * scl,
        UA = 12.5 * scl, FA = 11.5 * scl, TH = 16.5 * scl, SH = 15.5 * scl,
        HEAD = 8.6 * scl;
  const limbPt = (o, a, len) => ({ x: o.x + Math.sin(a) * len, y: o.y + Math.cos(a) * len });

  const hip = { x: 0, y: TOR / 2 };
  const tor = pose.tor;
  const neck = { x: hip.x - Math.sin(tor) * TOR, y: hip.y - Math.cos(tor) * TOR };

  // legs
  const hL = { x: hip.x - 2 * scl, y: hip.y }, hR = { x: hip.x + 2 * scl, y: hip.y };
  const kL = limbPt(hL, pose.lL1, TH), fL = limbPt(kL, pose.lL1 + pose.lL2, SH);
  const kR = limbPt(hR, pose.lR1, TH), fR = limbPt(kR, pose.lR1 + pose.lR2, SH);
  // arms
  const sL = { x: neck.x - 2.5 * scl, y: neck.y + 2 * scl }, sR = { x: neck.x + 2.5 * scl, y: neck.y + 2 * scl };
  const eL = limbPt(sL, pose.aL1, UA), wL = limbPt(eL, pose.aL1 + pose.aL2, FA);
  const eR = limbPt(sR, pose.aR1, UA), wR = limbPt(eR, pose.aR1 + pose.aR2, FA);

  // ground snap: keep feet planted for grounded poses
  let pivotH = TOR / 2 + TH + SH;
  if (pose.snap) pivotH = Math.max(fL.y, fR.y);

  // shadow
  const shScale = clamp(1 - pose.lift / 90, .35, 1);
  ctx.beginPath();
  ctx.ellipse(x, groundY + 3, 20 * scl * shScale, 6.5 * scl * shScale, 0, 0, TAU);
  ctx.fillStyle = 'rgba(50,40,90,.22)'; ctx.fill();

  ctx.save();
  ctx.translate(x, groundY - pose.lift - pivotH);
  ctx.scale(facing, 1);
  ctx.rotate(pose.rot);

  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  const limb = (a, b, c, w, col) => {
    ctx.strokeStyle = col; ctx.lineWidth = w;
    ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.lineTo(c.x, c.y); ctx.stroke();
  };

  // ponytail (behind everything)
  const headA = tor + pose.head;
  const hc = { x: neck.x - Math.sin(headA) * (HEAD + 2 * scl), y: neck.y - Math.cos(headA) * (HEAD + 2 * scl) };
  const wig = Math.sin(time * 9) * .25 - pose.rot * .12;
  const tailBase = { x: hc.x - HEAD * .85, y: hc.y - HEAD * .25 };
  const tailTip = { x: tailBase.x - HEAD * 1.7 * Math.cos(wig * .6 + .35), y: tailBase.y + HEAD * 1.9 * Math.sin(.9 + wig * .4) };
  ctx.strokeStyle = HAIR; ctx.lineWidth = 4.6 * scl;
  ctx.beginPath(); ctx.moveTo(tailBase.x, tailBase.y);
  ctx.quadraticCurveTo(tailBase.x - HEAD, tailBase.y - HEAD * .4 + wig * 6, tailTip.x, tailTip.y);
  ctx.stroke();

  // far limbs
  limb(sL, eL, wL, 4.6 * scl, SKIN2);
  limb(hL, kL, fL, 5.6 * scl, SKIN2);
  ctx.fillStyle = SKIN2;
  ctx.beginPath(); ctx.arc(wL.x, wL.y, 2.6 * scl, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(fL.x, fL.y, 2.8 * scl, 0, TAU); ctx.fill();

  // torso — USA leotard
  ctx.beginPath();
  ctx.moveTo(hip.x - HIPW, hip.y);
  ctx.quadraticCurveTo(hip.x - HIPW - 2 * scl, (hip.y + neck.y) / 2, sL.x - SHW + 2.5 * scl, neck.y + 1.5 * scl);
  ctx.quadraticCurveTo(neck.x, neck.y - 3 * scl, sR.x + SHW - 2.5 * scl, neck.y + 1.5 * scl);
  ctx.quadraticCurveTo(hip.x + HIPW + 2 * scl, (hip.y + neck.y) / 2, hip.x + HIPW, hip.y);
  ctx.quadraticCurveTo(hip.x, hip.y + 4 * scl, hip.x - HIPW, hip.y);
  ctx.closePath();
  ctx.fillStyle = BLUE; ctx.fill();
  ctx.save(); ctx.clip();
  // red side panels
  ctx.strokeStyle = RED; ctx.lineWidth = 4.4 * scl;
  ctx.beginPath();
  ctx.moveTo(sL.x - SHW + 2 * scl, neck.y + 1 * scl);
  ctx.quadraticCurveTo(hip.x - 2 * scl, (neck.y + hip.y) / 2 + 3 * scl, hip.x - HIPW, hip.y + 2 * scl);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(sR.x + SHW - 2 * scl, neck.y + 1 * scl);
  ctx.quadraticCurveTo(hip.x + 2 * scl, (neck.y + hip.y) / 2 + 3 * scl, hip.x + HIPW, hip.y + 2 * scl);
  ctx.stroke();
  // white chest star + sparkles
  starPath(neck.x, neck.y + 8.5 * scl, 3.4 * scl, 0);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  [[-3.5, 14], [3.8, 15.5], [0, 19]].forEach(([dx, dy]) => {
    ctx.beginPath(); ctx.arc(neck.x + dx * scl, neck.y + dy * scl, .9 * scl, 0, TAU); ctx.fill();
  });
  ctx.restore();

  // near limbs
  limb(hR, kR, fR, 5.6 * scl, SKIN);
  limb(sR, eR, wR, 4.6 * scl, SKIN);
  ctx.fillStyle = SKIN;
  ctx.beginPath(); ctx.arc(wR.x, wR.y, 2.6 * scl, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(fR.x, fR.y, 2.8 * scl, 0, TAU); ctx.fill();

  // head
  ctx.beginPath(); ctx.arc(hc.x, hc.y, HEAD, 0, TAU);
  ctx.fillStyle = SKIN; ctx.fill();
  // hair cap
  ctx.beginPath();
  ctx.arc(hc.x, hc.y, HEAD + .8 * scl, Math.PI * .62, Math.PI * 1.72);
  ctx.arc(hc.x + 1.2 * scl, hc.y - 1.2 * scl, HEAD * .76, Math.PI * 1.62, Math.PI * .78, true);
  ctx.closePath(); ctx.fillStyle = HAIR; ctx.fill();
  // bun + red bow
  ctx.beginPath(); ctx.arc(hc.x - HEAD * .8, hc.y - HEAD * .55, 3.6 * scl, 0, TAU);
  ctx.fillStyle = HAIR; ctx.fill();
  ctx.fillStyle = RED;
  ctx.beginPath();
  const bx = hc.x - HEAD * .8, by = hc.y - HEAD * .55 - 3.4 * scl;
  ctx.moveTo(bx, by); ctx.lineTo(bx - 3.4 * scl, by - 2.6 * scl); ctx.lineTo(bx - 2.4 * scl, by + 1.4 * scl); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(bx, by); ctx.lineTo(bx + 3.2 * scl, by - 2.8 * scl); ctx.lineTo(bx + 3.6 * scl, by + 1 * scl); ctx.closePath(); ctx.fill();
  // face
  ctx.fillStyle = '#3a2a20';
  ctx.beginPath(); ctx.arc(hc.x + 1.6 * scl, hc.y - 1 * scl, 1.15 * scl, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(hc.x + 5.6 * scl, hc.y - 1 * scl, 1.15 * scl, 0, TAU); ctx.fill();
  ctx.strokeStyle = '#b0543a'; ctx.lineWidth = 1.3 * scl;
  ctx.beginPath(); ctx.arc(hc.x + 3.6 * scl, hc.y + 2.2 * scl, 2.4 * scl, .25, Math.PI - .35); ctx.stroke();
  ctx.fillStyle = 'rgba(255,120,140,.4)';
  ctx.beginPath(); ctx.arc(hc.x + .2 * scl, hc.y + 2.4 * scl, 1.6 * scl, 0, TAU); ctx.fill();
  ctx.beginPath(); ctx.arc(hc.x + 7 * scl, hc.y + 2.4 * scl, 1.6 * scl, 0, TAU); ctx.fill();

  ctx.restore();
}

/* ---------------- popups / particles ---------------- */
function drawPopups() {
  for (let i = popups.length - 1; i >= 0; i--) {
    const p = popups[i];
    const age = time - p.t0;
    if (age < 0) continue;
    if (age > 1.6) { popups.splice(i, 1); continue; }
    const inT = clamp(age / .22, 0, 1);
    const scale = p.big ? .8 + easeOut(inT) * .5 : .7 + easeOut(inT) * .35;
    const rise = age * 34;
    const alpha = age > 1.2 ? 1 - (age - 1.2) / .4 : 1;
    ctx.save();
    ctx.translate(clamp(p.x, 70, W - 70), clamp(p.y - rise, 60, H - 40));
    ctx.scale(scale, scale);
    ctx.globalAlpha = alpha;
    ctx.textAlign = 'center';
    ctx.font = `900 ${p.big ? 24 : 19}px ui-rounded, system-ui, sans-serif`;
    ctx.lineWidth = 5; ctx.strokeStyle = 'rgba(255,255,255,.95)';
    ctx.strokeText(p.txt, 0, 0);
    ctx.fillStyle = p.big ? '#d81a7c' : '#5a34c8';
    ctx.fillText(p.txt, 0, 0);
    if (p.sub) {
      ctx.font = '900 17px ui-rounded, system-ui, sans-serif';
      ctx.strokeText(p.sub, 0, 21);
      ctx.fillStyle = '#c78a00'; ctx.fillText(p.sub, 0, 21);
    }
    ctx.restore();
  }
}
function drawSparks(dt) {
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i], age = time - s.t0;
    if (age > s.life) { sparks.splice(i, 1); continue; }
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += 260 * dt;
    ctx.globalAlpha = 1 - age / s.life;
    ctx.fillStyle = s.c;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.4, 0, TAU); ctx.fill();
  }
  ctx.globalAlpha = 1;
}
function drawConfetti(dt) {
  for (const c of confetti) {
    c.x += (c.vx + Math.sin(time * 3 + c.sway) * 40) * dt;
    c.y += c.vy * dt; c.vy += 150 * dt;
    if (c.vy > 130) c.vy = 130;
    c.rot += c.vr * dt;
    ctx.save();
    ctx.translate(c.x, c.y); ctx.rotate(c.rot);
    ctx.fillStyle = c.c;
    ctx.fillRect(-c.w / 2, -c.h / 2, c.w, c.h);
    ctx.restore();
  }
  for (let i = confetti.length - 1; i >= 0; i--) if (confetti[i].y > H + 30) confetti.splice(i, 1);
}

/* ---------------- score HUD during replay ---------------- */
function drawLiveScore() {
  ctx.textAlign = 'center';
  ctx.font = '900 26px ui-rounded, system-ui, sans-serif';
  const y = topSafe() + 26;
  ctx.lineWidth = 6; ctx.strokeStyle = 'rgba(255,255,255,.9)';
  ctx.strokeText(score + ' pts', W / 2, y);
  ctx.fillStyle = '#5a34c8'; ctx.fillText(score + ' pts', W / 2, y);
  if (starCount > 0) {
    ctx.font = '800 16px ui-rounded, system-ui, sans-serif';
    ctx.strokeText('⭐ ' + starCount, W / 2, y + 22);
    ctx.fillStyle = '#c78a00'; ctx.fillText('⭐ ' + starCount, W / 2, y + 22);
  }
}

/* ---------------- main loop ---------------- */
let lastNow = performance.now();
function frame(now) {
  const dt = Math.min(.05, (now - lastNow) / 1000);
  lastNow = now; time = now / 1000;
  if (state !== 'menu') {
    drawArena();

    if (state === 'trace') {
      if (!raw.length) drawStartHint();
      drawTrail();
    }

    if (state === 'replay' || state === 'score') {
      drawTrail();
      const t = (now - replayT0) / 1000;
      let sg = segs[segs.length - 1];
      for (const s of segs) if (t >= s.t0 && t < s.t1) { sg = s; break; }
      const ph = clamp((t - sg.t0) / Math.max(.001, sg.t1 - sg.t0), 0, 1);
      const s = lerp(S[sg.i0], S[sg.i1], ph);
      drawTrailProgress(s);
      drawStars();

      const idx = idxAtS(s);
      const pt = P[Math.min(idx, P.length - 1)];
      // facing from tangent
      const ahead = P[Math.min(idx + 3, P.length - 1)], behind = P[Math.max(idx - 3, 0)];
      const dx = ahead.x - behind.x;
      if (Math.abs(dx) > 4) lastFacing = dx >= 0 ? 1 : -1;

      // trigger move popups once
      if (sg.type === 'move' && !sg.fired) { sg.fired = true; triggerMove(sg, pt.x, pt.y); }
      if (sg.type === 'finish' && !replayDone && t >= sg.t0 + .2) endRoutine();

      // star collection
      for (const st of stars) {
        if (!st.got && Math.abs(st.s - s) < 14) {
          st.got = true; starCount++; score += 25;
          blip(1250, .12, 'sine', .14); buzz(12);
          for (let k = 0; k < 6; k++) sparks.push(newSpark(st.x, st.y));
        }
      }

      // wobble on beam when off the wood
      let effSeg = sg;
      if (EV.id === 'beam' && sg.type === 'run' && !EV.onBeam(pt.x)) effSeg = { type: 'wobble' };
      const pose = poseFor(effSeg, ph, s);
      drawGymnast(pt.x, pt.y, pose, lastFacing, charScale());

      // moving sparkle trail during tricks
      if (sg.type === 'move' && Math.random() < .5) sparks.push(newSpark(pt.x, pt.y - 20));

      drawLiveScore();
    }

    drawSparks(dt);
    drawPopups();
    drawConfetti(dt);
  }
  requestAnimationFrame(frame);
}
resize();
goMenu();
requestAnimationFrame(frame);
</script>
