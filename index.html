<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Family Game Arcade</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#ffd7ec">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; }
  body {
    font-family: ui-rounded, -apple-system, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    background:linear-gradient(160deg,#ffe3f2 0%,#ffd0e8 35%,#e6d4ff 70%,#cfe0ff 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    gap:20px; padding:24px; text-align:center; user-select:none;
  }
  h1 {
    font-size:clamp(30px,8vw,44px); color:#c2186f; line-height:1.1;
    text-shadow:0 3px 0 #ffffffb0, 0 8px 22px rgba(190,30,110,.25);
  }
  .sub { color:#8c3a6b; font-weight:700; font-size:16px; }
  .games { display:flex; flex-direction:column; gap:14px; width:min(340px,90vw); }
  a.game {
    text-decoration:none; border-radius:22px; padding:18px 20px;
    font-size:22px; font-weight:900; color:#fff; text-align:left;
    display:flex; align-items:center; gap:14px;
    box-shadow:0 6px 0 rgba(0,0,0,.14), 0 10px 22px rgba(160,40,100,.25);
    transition:transform .1s;
  }
  a.game:active { transform:translateY(3px); box-shadow:0 3px 0 rgba(0,0,0,.14); }
  a.game small { display:block; font-size:13px; font-weight:700; opacity:.92; }
  a.game .ic { font-size:34px; }
  .maddie { background:linear-gradient(135deg,#ff4f9a,#7a5cf0); }
  .ryan { background:linear-gradient(135deg,#19b8a6,#2f8fe8); }
</style>
</head>
<body>
  <h1>🎮 Family Game Arcade</h1>
  <div class="sub">Pick a game!</div>
  <div class="games">
    <a class="game maddie" href="/maddies-gymnastics-game/">
      <span class="ic">🤸‍♀️</span>
      <span>Maddie's Gymnastics<small>Draw a routine — Maddie performs it!</small></span>
    </a>
    <a class="game ryan" href="/ryans-fishing-game/">
      <span class="ic">🎣</span>
      <span>Ryan's Fishing Game<small>A calm day of fishing on the pier</small></span>
    </a>
  </div>
</body>
</html>
