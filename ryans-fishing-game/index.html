<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Ryan's Fishing Game</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#ffd9a0">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body { height:100%; overflow:hidden; overscroll-behavior:none; }
  body {
    font-family: ui-rounded, -apple-system, "SF Pro Rounded", "Segoe UI", system-ui, sans-serif;
    background:#ffd9a0;
    touch-action:none;
    user-select:none; -webkit-user-select:none;
    position:fixed; inset:0;
  }
  canvas { display:block; width:100vw; height:100vh; touch-action:none; }

  #topbar {
    position:fixed; top:calc(env(safe-area-inset-top, 0px) + 10px);
    left:0; right:0; display:flex; justify-content:space-between;
    padding:0 12px; pointer-events:none; z-index:5;
  }
  .pill {
    pointer-events:auto; border:none; cursor:pointer;
    font-family:inherit;
    background:rgba(255,255,255,.82); backdrop-filter:blur(4px);
    border-radius:999px; padding:8px 16px; font-weight:800; font-size:20px;
    color:#2b5876; box-shadow:0 2px 8px rgba(60,60,90,.18);
    display:flex; align-items:center; gap:7px;
  }
  .pill:active { transform:scale(.95); }
  .btn {
    pointer-events:auto; border:none; cursor:pointer;
    background:rgba(255,255,255,.82); backdrop-filter:blur(4px);
    border-radius:999px; width:44px; height:44px; font-size:22px;
    box-shadow:0 2px 8px rgba(60,60,90,.18);
    display:flex; align-items:center; justify-content:center;
  }
  .btn:active { transform:scale(.92); }
  .btn.off { opacity:.4; filter:grayscale(1); }
  #rightBtns { display:flex; gap:8px; }

  /* Splash screen */
  #splash {
    position:fixed; inset:0; z-index:10;
    background:linear-gradient(#ffe9c4 0%, #ffd9a0 34%, #ffc98f 52%, #9fd8d4 53%, #6fbdc4 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; gap:18px; transition:opacity .6s ease;
  }
  #splash.hide { opacity:0; pointer-events:none; }
  #splash .sun {
    width:110px; height:110px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #fff7e0, #ffdf7e 60%, #ffc857);
    box-shadow:0 0 70px 30px rgba(255,214,130,.75);
    animation:float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-10px)} }
  #splash h1 {
    font-size:clamp(38px, 10vw, 60px); color:#20586e;
    text-shadow:0 2px 0 rgba(255,255,255,.6); line-height:1.05; padding:0 20px;
  }
  #splash .tap {
    font-size:24px; font-weight:800; color:#fff;
    background:#ff8a5c; padding:16px 38px; border-radius:999px;
    box-shadow:0 6px 0 #e06a3e, 0 10px 22px rgba(224,106,62,.4);
    animation:pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.07)} }
  #splash .sub { color:#1e4e60; font-weight:700; font-size:17px; opacity:.85; padding:0 30px; }

  /* Fish log panel */
  #logPanel {
    position:fixed; inset:0; z-index:8; display:none;
    background:rgba(20,60,80,.45); backdrop-filter:blur(3px);
    align-items:center; justify-content:center;
  }
  #logPanel.open { display:flex; }
  #logCard {
    background:#fffaf0; border-radius:26px; padding:20px 18px 14px;
    width:min(88vw, 380px); max-height:78vh; overflow-y:auto;
    box-shadow:0 18px 50px rgba(0,0,40,.35);
  }
  #logCard h2 { color:#2b5876; text-align:center; font-size:24px; margin-bottom:12px; }
  #logTotal {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:#fff3d6; border-radius:16px; padding:10px 14px; margin-bottom:10px;
    font-size:24px; font-weight:900; color:#c9862e;
  }
  #logTotal span { font-size:15px; font-weight:800; color:#3a5a70; }
  #logRod {
    display:flex; flex-direction:column; align-items:center; gap:2px;
    background:#e8f4ee; border-radius:16px; padding:8px 14px; margin-bottom:10px;
    font-size:17px; font-weight:900; color:#2b7a5e;
  }
  #logRod span { font-size:13px; font-weight:800; color:#3a5a70; }
  .fishrow .cnt.zero { color:#b8c4c0; }
  .fishrow.locked { opacity:.6; }
  .fishrow {
    display:flex; align-items:center; gap:12px; padding:8px 6px;
    border-bottom:1.5px dashed #e8dcc8; font-weight:700; color:#3a5a70;
  }
  .fishrow:last-child { border-bottom:none; }
  .fishrow svg { flex:0 0 auto; }
  .fishrow .nm { flex:1; font-size:17px; }
  .fishrow .pts { font-size:13px; color:#c98a3d; font-weight:800; }
  .fishrow .cnt { font-size:20px; color:#2b8a6e; font-weight:900; min-width:44px; text-align:right; }
  #closeLog {
    display:block; margin:12px auto 4px; border:none; background:#ff8a5c; color:#fff;
    font-size:18px; font-weight:800; padding:10px 34px; border-radius:999px;
    box-shadow:0 4px 0 #e06a3e; cursor:pointer;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="topbar">
  <button class="pill" id="scorePill"><span>⭐</span><span id="score">0</span></button>
  <div id="rightBtns">
    <button class="btn" id="logBtn" title="My fish">🐟</button>
    <button class="btn" id="musicBtn" title="Music">🪕</button>
    <button class="btn" id="muteBtn" title="Sound">🔊</button>
  </div>
</div>

<div id="logPanel">
  <div id="logCard">
    <h2>🪣 Ryan's Fish</h2>
    <div id="logRows"></div>
    <button id="closeLog">Back to fishing!</button>
  </div>
</div>

<div id="splash">
  <div class="sun"></div>
  <h1>🎣 Ryan's<br>Fishing Game</h1>
  <div class="tap">Tap to Play!</div>
  <div class="sub">Pull back… let go to cast!<br>When it tugs — pull up fast! ⬆️</div>
</div>

<script>
'use strict';
/* ================================================================
   Ryan's Fishing Game — a calm morning on the pier.
   Pull back to cast (further pull = further cast), wait for the
   tug (phone buzzes!), then swipe UP to catch the fish.
   ================================================================ */

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
let waterY = 0, deckY = 0, pierEnd = 0, kidX = 0;
let rodBase = {x:0,y:0}, rodTip = {x:0,y:0};

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  waterY = H * 0.56;
  deckY  = waterY - Math.max(34, H * 0.05);
  pierEnd = Math.min(W * 0.24, 120);
  kidX = pierEnd - 46;
  // the grip point — where the kid's hands hold the rod, at chest height
  rodBase = { x: kidX + 13, y: deckY - 33 };
}
resize();
window.addEventListener('resize', resize);

/* ---------------- Fish data (ascending point value) ------------- */
const FISH = [
  { id:'sardine',  name:'Sardine',      pts:10,  len:44, hRatio:.30, rar:0,
    body:'#aec8de', back:'#5d7fa6', belly:'#e9f2f8', pattern:'dots' },
  { id:'shiner',   name:'Shiner Perch', pts:15,  len:48, hRatio:.42, rar:1,
    body:'#c9d4d9', back:'#8fa3ad', belly:'#f2f5f4', pattern:'bars' },
  { id:'surf',     name:'Surf Perch',   pts:20,  len:56, hRatio:.44, rar:2,
    body:'#c4cdb9', back:'#84987c', belly:'#eef0e6', pattern:'bars' },
  { id:'opaleye',  name:'Opaleye',      pts:30,  len:60, hRatio:.42, rar:3,
    body:'#6f8f62', back:'#48663f', belly:'#a9bd9a', pattern:'opal' },
  { id:'mackerel', name:'Mackerel',     pts:40,  len:70, hRatio:.26, rar:4,
    body:'#7fb8b3', back:'#2e6e78', belly:'#e6f2ef', pattern:'waves' },
  { id:'bass',     name:'Striped Bass', pts:60,  len:84, hRatio:.34, rar:5,
    body:'#c3cdd4', back:'#6d7f8c', belly:'#f0f3f4', pattern:'stripes' },
  { id:'halibut',  name:'Halibut',      pts:80,  len:96, hRatio:.52, rar:6,
    body:'#a3835c', back:'#7d6141', belly:'#e8dcc4', pattern:'flat' },
  { id:'salmon',   name:'Salmon',       pts:100, len:106, hRatio:.30, rar:7,
    body:'#d9a3a0', back:'#7e94a4', belly:'#f4e6e2', pattern:'salmon' },
  // super-rare deep-water prizes — only really show up on big casts
  { id:'mahi',     name:'Mahi-Mahi',    pts:150, len:118, hRatio:.36, rar:10,
    body:'#c2d06a', back:'#3f8f5e', belly:'#f4eaa4', pattern:'mahi' },
  { id:'tuna',     name:'Yellowfin Tuna', pts:250, len:130, hRatio:.36, rar:13,
    body:'#9fb4c4', back:'#2b4a66', belly:'#e8eef2', pattern:'tuna' },
  // apex billfish — locked until the Golden Offshore Rod (6th rod)
  { id:'sword',    name:'Swordfish',    pts:400, len:150, hRatio:.22, rar:14, minRod:5,
    body:'#8fa8bd', back:'#41586e', belly:'#e4ecf2', pattern:'sword' },
  { id:'marlin',   name:'Blue Marlin',  pts:600, len:165, hRatio:.26, rar:16, minRod:5,
    body:'#5b84b0', back:'#1d3c60', belly:'#dfe9f2', pattern:'marlin' },
];

/* ---------------- Rods (leveling system) -------------------------
   Modeled on real rods. `need` = total fish caught to unlock.
   `lenS` scales the drawn rod, `cap` limits how far it can cast
   (fraction of the full screen), so better rods reach bigger fish. */
const RODS = [
  { name:"Lil' Yellow Toy Rod",   real:'a Shakespeare toy-store rod',            need:0,
    blank:'#f4c531', grip:'#e0574f', reel:'#e0574f', line:'rgba(255,255,255,0.85)',
    lenS:0.85, width:5,   cap:0.60 },
  { name:"Splash Blue Kids' Rod", real:'a Zebco kids combo',                     need:3,
    blank:'#7ec8e3', grip:'#f2f4f5', reel:'#8a9bb0', line:'rgba(255,255,255,0.85)',
    lenS:1.0,  width:4.5, cap:0.72 },
  { name:'Black Ultralight',      real:'an ultralight spinning rod',             need:8,
    blank:'#33383f', grip:'#c9a06a', reel:'#aab4c0', line:'rgba(255,255,255,0.85)',
    lenS:1.15, width:3.5, cap:0.82 },
  { name:'Blue Braid Caster',     real:'a saltwater rod with blue braided line', need:15,
    blank:'#2f6bb0', grip:'#26313d', reel:'#4a90d9', line:'rgba(90,150,230,0.95)',
    lenS:1.3,  width:4,   cap:0.90 },
  { name:'Big Surf Rod',          real:'a 10-foot surf casting rod',             need:25,
    blank:'#e8e4da', grip:'#26313d', reel:'#6b7686', line:'rgba(255,255,255,0.85)',
    lenS:1.5,  width:4.5, cap:0.96 },
  { name:'Golden Offshore Rod',   real:'an offshore trolling rod',               need:40,
    blank:'#5a4a33', grip:'#26313d', reel:'#d4af37', line:'rgba(240,215,130,0.95)',
    lenS:1.65, width:5.5, cap:1.0 },
  /* From here the rods get crazier. `luck` nudges the fish odds toward
     the big ones, and `waitS` makes bites come sooner. */
  { name:'Carbon Pro Tournament', real:'a tournament bass rod',                  need:60,
    blank:'#3a4548', grip:'#111418', reel:'#66d43c', line:'rgba(150,255,90,0.95)',
    lenS:1.75, width:4,   cap:1.0, luck:0.03, waitS:0.95 },
  { name:'Big Game Marlin Rod',   real:'a 130-class marlin rod',                 need:85,
    blank:'#1f3a5c', grip:'#111418', reel:'#c0c8d4', line:'rgba(220,230,255,0.9)',
    lenS:1.85, width:6,   cap:1.0, luck:0.06, waitS:0.9 },
  { name:'Midnight Glow Rod',     real:'a glow-tip night fishing rod',           need:115,
    blank:'#19e3e0', grip:'#0c2a33', reel:'#0fa8b8', line:'rgba(130,250,255,0.95)',
    lenS:1.95, width:4.5, cap:1.0, luck:0.10, waitS:0.85, glow:'#7ff9ff' },
  { name:'Rainbow Legend Rod',    real:'a rod out of fishing legends',           need:150,
    blank:'#e85d9e', grip:'#5a2a6e', reel:'#ffd166', line:'rgba(255,190,240,0.95)',
    lenS:2.05, width:5,   cap:1.0, luck:0.15, waitS:0.8, rainbow:true },
  { name:'Storm Lightning Rod',   real:'a rod forged in a thunderstorm',         need:200,
    blank:'#ffe95c', grip:'#333a4a', reel:'#8fa3c8', line:'rgba(255,245,160,0.95)',
    lenS:2.15, width:5.5, cap:1.0, luck:0.20, waitS:0.72, glow:'#fff7b0' },
  { name:"Wizard's Star Rod",     real:"a wizard's enchanted rod",               need:260,
    blank:'#8a5cf0', grip:'#2d1b4e', reel:'#ffd166', line:'rgba(200,160,255,0.95)',
    lenS:2.25, width:5,   cap:1.0, luck:0.25, waitS:0.65, glow:'#c9a6ff' },
];
function levelForCount(n) { let l = 0; RODS.forEach((r, i) => { if (n >= r.need) l = i; }); return l; }

/* ---------------- Persistent score ------------------------------ */
let save = { score:0, counts:{} };
try { const s = JSON.parse(localStorage.getItem('ryansFishing')); if (s && typeof s.score==='number') save = s; } catch(e){}
function persist(){ try { localStorage.setItem('ryansFishing', JSON.stringify(save)); } catch(e){} }
const scoreEl = document.getElementById('score');
scoreEl.textContent = save.score;
function totalFishCaught() { return FISH.reduce((n, f) => n + (save.counts[f.id] || 0), 0); }
if (save.rodLvl == null) save.rodLvl = levelForCount(totalFishCaught());
let rodLvl = Math.min(save.rodLvl, RODS.length - 1);

/* ---------------- Audio (gentle & optional) ---------------------- */
/* Two independent buses: sfxBus (waves, plops, chimes — the 🔊 button)
   and musicBus (the background tune — the 🪕 button). */
let AC = null, sfxBus = null, musicBus = null;
let muted = !!save.muted;
let musicOn = save.music !== false;
function initAudio() {
  if (AC) { if (AC.state === 'suspended') AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    sfxBus = AC.createGain(); sfxBus.gain.value = muted ? 0 : 1;
    sfxBus.connect(AC.destination);
    musicBus = AC.createGain(); musicBus.gain.value = musicOn ? 1 : 0;
    musicBus.connect(AC.destination);
    startAmbience();
    if (musicOn) startMusic();
  } catch(e) { AC = null; }
}
function startAmbience() {
  // soft wave wash: looped noise -> lowpass, slow gain swell
  const len = AC.sampleRate * 4;
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  const src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
  const lp = AC.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420; lp.Q.value = 0.4;
  const g = AC.createGain(); g.gain.value = 0.035;
  const lfo = AC.createOscillator(); lfo.frequency.value = 0.09;
  const lfoG = AC.createGain(); lfoG.gain.value = 0.02;
  lfo.connect(lfoG); lfoG.connect(g.gain);
  src.connect(lp); lp.connect(g); g.connect(sfxBus);
  src.start(); lfo.start();
}
function tone(freq, t0, dur, type, vol, slideTo) {
  if (!AC) return;
  const o = AC.createOscillator(), g = AC.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, t0 + dur);
  g.gain.setValueAtTime(0.0001, t0);
  g.gain.exponentialRampToValueAtTime(vol, t0 + 0.015);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(sfxBus);
  o.start(t0); o.stop(t0 + dur + 0.05);
}
const sfx = {
  plop()  { if(!AC) return; const t=AC.currentTime; tone(520,t,.18,'sine',.25,140); },
  nibble(){ if(!AC) return; const t=AC.currentTime; tone(340,t,.09,'sine',.12,300); },
  bite()  { if(!AC) return; const t=AC.currentTime; tone(300,t,.12,'square',.10,180); tone(300,t+.14,.12,'square',.10,180); },
  cast()  { if(!AC) return; const t=AC.currentTime; tone(200,t,.25,'sine',.12,700); },
  catch_(){ if(!AC) return; const t=AC.currentTime;
            [523,659,784,1047].forEach((f,i)=>tone(f, t+i*.09, .28, 'sine', .18)); },
  big()   { if(!AC) return; const t=AC.currentTime;
            [523,659,784,1047,1319,1568].forEach((f,i)=>tone(f, t+i*.08, .3, 'sine', .18)); },
  aw()    { if(!AC) return; const t=AC.currentTime; tone(420,t,.22,'sine',.10,340); tone(340,t+.2,.3,'sine',.09,260); },
};
const muteBtn = document.getElementById('muteBtn');
muteBtn.textContent = muted ? '🔇' : '🔊';
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
  if (sfxBus) sfxBus.gain.value = muted ? 0 : 1;
  save.muted = muted; persist();
});

/* ---------------- Background music (the 🪕 button) ----------------
   An original, gentle country-folk shuffle — boom-chick bass, brushed
   offbeats, and a plucked pentatonic melody. Evokes a campfire tune
   without borrowing one. Key of G, ~96 BPM, 8-bar loop. */
const MUSIC_BPM = 96;
const mtof = m => 440 * Math.pow(2, (m - 69) / 12);
// per bar: [bass root, bass fifth] as MIDI notes
const MUSIC_BARS = [
  [43, 50], [43, 50], [48, 43], [43, 50],   // G G C G
  [43, 50], [43, 50], [50, 45], [43, 50],   // G G D G
];
// melody: [beat in 32-beat loop, MIDI note, length in beats]
const MUSIC_MELODY = [
  [0,67,.5],[0.5,69,.5],[1,71,1],[2,74,1],[3,71,.5],[3.5,69,.5],
  [4,67,1.5],[5.5,64,.5],[6,62,2],
  [8,76,.5],[8.5,74,.5],[9,72,1],[10,69,1],[11,67,1],
  [12,67,.5],[12.5,71,.5],[13,69,1],[14,67,2],
  [16,67,.5],[16.5,69,.5],[17,71,1],[18,74,1],[19,76,1],
  [20,74,.5],[20.5,71,.5],[21,69,1],[22,71,.5],[22.5,69,.5],[23,67,1],
  [24,69,.5],[24.5,67,.5],[25,66,1],[26,62,1],[27,64,.5],[27.5,66,.5],
  [28,67,2],[30,62,.5],[30.5,64,.5],[31,67,1],
];
let musicTimer = null, musicBeat = 0, musicNextTime = 0;

function pluckNote(midi, t, dur, vol) {
  // plucked-string feel: triangle osc, darkening lowpass, fast decay
  const o = AC.createOscillator(); o.type = 'triangle'; o.frequency.value = mtof(midi);
  const f = AC.createBiquadFilter(); f.type = 'lowpass';
  f.frequency.setValueAtTime(2400, t);
  f.frequency.exponentialRampToValueAtTime(500, t + dur);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.012);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(f); f.connect(g); g.connect(musicBus);
  o.start(t); o.stop(t + dur + 0.05);
}
function bassNote(midi, t, dur, vol) {
  const o = AC.createOscillator(); o.type = 'sine'; o.frequency.value = mtof(midi);
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g); g.connect(musicBus);
  o.start(t); o.stop(t + dur + 0.05);
}
function brushTick(t, vol) {
  // soft brushed snare on the offbeats
  const len = Math.floor(AC.sampleRate * 0.05);
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = AC.createBufferSource(); src.buffer = buf;
  const hp = AC.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3000;
  const g = AC.createGain(); g.gain.value = vol;
  src.connect(hp); hp.connect(g); g.connect(musicBus);
  src.start(t);
}
function scheduleMusic() {
  if (!AC || !musicOn) return;
  const spb = 60 / MUSIC_BPM;
  while (musicNextTime < AC.currentTime + 0.65) {
    const beat = musicBeat % 32;
    const t = musicNextTime;
    const bar = Math.floor(beat / 4), bi = beat % 4;
    const chord = MUSIC_BARS[bar];
    if (bi === 0) bassNote(chord[0], t, spb * 0.95, 0.11);   // boom
    if (bi === 2) bassNote(chord[1], t, spb * 0.95, 0.10);
    if (bi === 1 || bi === 3) brushTick(t, 0.035);           // chick
    for (const [b, m, d] of MUSIC_MELODY) {
      if (b >= beat && b < beat + 1) {
        const swing = (b % 1) ? 0.09 * spb : 0;              // lazy offbeats
        pluckNote(m, t + (b - beat) * spb + swing, d * spb * 0.95, 0.10);
      }
    }
    musicBeat++; musicNextTime += spb;
  }
}
function startMusic() {
  if (musicTimer || !AC) return;
  musicNextTime = Math.max(musicNextTime, AC.currentTime + 0.1);
  scheduleMusic();
  musicTimer = setInterval(scheduleMusic, 200);
}
function stopMusic() {
  if (musicTimer) { clearInterval(musicTimer); musicTimer = null; }
}
const musicBtn = document.getElementById('musicBtn');
musicBtn.classList.toggle('off', !musicOn);
musicBtn.addEventListener('click', () => {
  musicOn = !musicOn;
  musicBtn.classList.toggle('off', !musicOn);
  if (musicBus) musicBus.gain.value = musicOn ? 1 : 0;
  if (musicOn) startMusic(); else stopMusic();
  save.music = musicOn; persist();
});

function buzz(pattern) { if (navigator.vibrate) { try { navigator.vibrate(pattern); } catch(e){} } }

/* ---------------- Fish log panel -------------------------------- */
const logPanel = document.getElementById('logPanel');
const logRows = document.getElementById('logRows');
function fishSVG(f, size) {
  const w = size, h = size * 0.55;
  return `<svg width="${w}" height="${h}" viewBox="0 0 100 55">
    <path d="M8 27 L24 12 L24 42 Z" fill="${f.back}"/>
    <ellipse cx="58" cy="27" rx="38" ry="${20*f.hRatio/0.4}" fill="${f.body}"/>
    <path d="M28 27 Q58 ${27-24*f.hRatio/0.4} 92 27 Q58 ${27-6} 28 27" fill="${f.back}" opacity=".8"/>
    <circle cx="82" cy="23" r="3.4" fill="#20303c"/>
    <circle cx="83" cy="22" r="1.1" fill="#fff"/>
  </svg>`;
}
function renderLog() {
  const totalFish = FISH.reduce((n, f) => n + (save.counts[f.id] || 0), 0);
  const nextRod = RODS[rodLvl + 1];
  const rodLine = nextRod
    ? `Next rod: catch ${Math.max(1, nextRod.need - totalFish)} more fish!`
    : 'Best rod in the tackle box!';
  logRows.innerHTML =
    `<div id="logTotal">⭐ ${save.score} points<span>🐟 ${totalFish} fish caught</span></div>` +
    `<div id="logRod">🎣 ${RODS[rodLvl].name}<span>${rodLine}</span></div>` +
    FISH.map(f => {
      const n = save.counts[f.id] || 0;
      const locked = (f.minRod || 0) > rodLvl;
      const pts = locked
        ? `+${f.pts} points · needs the ${RODS[f.minRod].name}!`
        : `+${f.pts} points`;
      const cnt = locked ? '🔒' : `×${n}`;
      return `<div class="fishrow${locked ? ' locked' : ''}">${fishSVG(f, 62)}
        <div class="nm">${f.name}<br><span class="pts">${pts}</span></div>
        <div class="cnt${!locked && !n ? ' zero' : ''}">${cnt}</div></div>`;
    }).join('');
}
const openLog = () => { renderLog(); logPanel.classList.add('open'); };
document.getElementById('logBtn').addEventListener('click', openLog);
document.getElementById('scorePill').addEventListener('click', openLog);
document.getElementById('closeLog').addEventListener('click', () => logPanel.classList.remove('open'));
logPanel.addEventListener('pointerdown', e => { if (e.target === logPanel) logPanel.classList.remove('open'); });

/* ---------------- Game state ------------------------------------ */
const S = { TITLE:0, IDLE:1, AIM:2, FLY:3, WAIT:4, BITE:5, CATCH:6, CELEBRATE:7, LEVELUP:8 };
let state = S.TITLE;
let now = 0, last = 0;

let power = 0;                     // 0..1 while aiming
let aimStart = null;
let bob = { x:0, y:0, vx:0, vy:0 };// bobber
let castDist01 = 0;                // how far this cast went, 0..1
let events = [];                   // scheduled nibble/bite events for this cast
let biteStart = 0, biteWindow = 2.4;
let hookedFish = null, pendingFish = null;
let catchT = 0, celebrateT = 0, celebrateUntil = 0;
let levelUpT = 0, pendingLevelUp = null;
let catchFrom = null, catchTo = null;
let msg = null;                    // {text, until, big}
let pullStart = null, pulledThisTouch = false;
let castsMade = 0;

const ripples = [];   // {x,y,r,max,alpha}
const sparkles = [];  // {x,y,vx,vy,life,color,r}
const drops = [];     // water droplets {x,y,vx,vy,life}
const gulls = [];     // {x,y,v,flap}
let nextGull = 3;
let shadow = null;    // approaching fish shadow {x,y,tx,ty,size}

const rand = (a,b) => a + Math.random() * (b - a);
const clamp = (v,a,b) => Math.max(a, Math.min(b, v));
const lerp = (a,b,t) => a + (b-a)*t;
const ease = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;

function setMsg(text, dur, big) { msg = { text, until: now + dur, big: !!big }; }

function currentRodTip() {
  // rod pivots at rodBase; bends back while aiming, points out otherwise
  const len = Math.max(50, Math.min(70, H * 0.0875)) * RODS[rodLvl].lenS;
  let ang = -0.9;                       // resting angle (up-right)
  if (state === S.AIM)  ang = -0.9 - power * 0.85;   // pull back
  if (state === S.BITE) ang = -0.62;                 // tug forward
  if (state === S.CATCH) ang = -1.35;                // hoist up
  return { x: rodBase.x + Math.cos(ang) * len, y: rodBase.y + Math.sin(ang) * len, ang, len };
}

/* ---------------- Casting --------------------------------------- */
const GRAV = 1400;
function doCast() {
  const tip = currentRodTip();
  const minCast = 70;
  const maxCastAbs = W - tip.x - 26;                 // best rod's full reach
  const maxCast = minCast + (maxCastAbs - minCast) * RODS[rodLvl].cap;
  const dist = lerp(minCast, maxCast, power);
  const T = 0.85 + 0.4 * power;
  bob.x = tip.x; bob.y = tip.y;
  bob.vx = dist / T;
  bob.vy = ((waterY - tip.y) - 0.5 * GRAV * T * T) / T;
  // fish odds scale against the ABSOLUTE max, so far fish need better rods
  castDist01 = clamp((dist - minCast) / Math.max(1, maxCastAbs - minCast), 0, 1);
  state = S.FLY;
  sfx.cast();
  castsMade++;
}
function landBobber() {
  bob.y = waterY;
  state = S.WAIT;
  splash(bob.x, waterY, 1);
  sfx.plop();
  scheduleBites();
  setMsg('Wait for it…', 2.5);
}
function scheduleBites() {
  // decide the fish now so the approaching shadow can match its size
  pendingFish = pickFish();
  events = [];
  const ws = RODS[rodLvl].waitS || 1;   // fancy rods tempt fish faster
  let t = now + rand(1.4, 4.2) * ws;
  const nibbles = Math.random() < 0.6 ? 1 : (Math.random() < 0.5 ? 2 : 0);
  for (let i = 0; i < nibbles; i++) { events.push({ t, type:'nibble' }); t += rand(0.8, 1.6) * ws; }
  events.push({ t: t + rand(0.4, 1.0) * ws, type:'bite' });
  // fish shadow sneaks toward the bobber a moment before the bite
  const biteT = events[events.length-1].t;
  events.push({ t: biteT - 1.2, type:'shadow' });
  events.sort((a,b)=>a.t-b.t);
}

/* ---------------- Bite / catch / miss ---------------------------- */
function startBite() {
  state = S.BITE;
  biteStart = now;
  buzz([70, 60, 70]);
  sfx.bite();
  setMsg('PULL UP! ⬆️', biteWindow, true);
}
function pickFish() {
  if (window.__forceFish) {                       // testing hook
    const f = FISH.find(f => f.id === window.__forceFish);
    if (f) return f;
  }
  const d = clamp(castDist01 + (RODS[rodLvl].luck || 0), 0, 1);
  let total = 0;
  const w = FISH.map(f => {
    if ((f.minRod || 0) > rodLvl) return 0;   // billfish need the big rods
    const v = Math.exp(-f.rar * (1.1 - 0.95 * d)); total += v; return v;
  });
  let r = Math.random() * total;
  for (let i = 0; i < FISH.length; i++) { r -= w[i]; if (r <= 0) return FISH[i]; }
  return FISH[0];
}
function doCatch() {
  hookedFish = pendingFish || pickFish();
  pendingFish = null;
  state = S.CATCH;
  catchT = now;
  catchFrom = { x: bob.x, y: waterY + 6 };
  catchTo = { x: clamp(rodBase.x + 90, 90, W - 120), y: deckY - Math.max(150, H * 0.22) };
  splash(bob.x, waterY, 1.4);
  for (let i = 0; i < 10; i++) drops.push({ x:bob.x, y:waterY, vx:rand(-140,140), vy:rand(-380,-120), life:1 });
  shadow = null;
  msg = null;
  buzz(40);
  sfx.plop();
}
function finishCatch() {
  state = S.CELEBRATE;
  celebrateT = now;
  celebrateUntil = now + 2.3;
  save.score += hookedFish.pts;
  save.counts[hookedFish.id] = (save.counts[hookedFish.id] || 0) + 1;
  const newLvl = levelForCount(totalFishCaught());
  if (newLvl > rodLvl) pendingLevelUp = newLvl;   // celebrate first, then upgrade
  persist();
  scoreEl.textContent = save.score;
  (hookedFish.rar >= 5 ? sfx.big : sfx.catch_)();
  buzz([30, 40, 30, 40, 80]);
  const cx = W/2, cy = H*0.34;
  const colors = ['#ffd166','#ef767a','#70c1b3','#a682ff','#ffe9c4'];
  for (let i = 0; i < 34; i++) {
    const a = rand(0, Math.PI*2), sp = rand(60, 340);
    sparkles.push({ x:cx, y:cy, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-120, life:rand(.8,1.5),
                    color:colors[i%colors.length], r:rand(3,7) });
  }
}
function doMiss() {
  state = S.WAIT;
  sfx.aw();
  splash(bob.x, waterY, 0.7);
  if (shadow) { shadow.flee = true; }
  setMsg('Ooh, it got away! Stay ready…', 2.2);
  scheduleBites();
}
function prematurePull() {
  splash(bob.x, waterY, 0.5);
  setMsg('No fish yet — wait for the tug! 🎣', 2);
  // push the schedule back a touch
  events.forEach(e => e.t += 0.8);
}

/* ---------------- Input ------------------------------------------ */
const splashEl = document.getElementById('splash');
function startGame() {
  initAudio();
  splashEl.classList.add('hide');
  state = S.IDLE;
  setMsg('Pull back… and let go!', 4);
}
splashEl.addEventListener('pointerdown', startGame);

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  initAudio();
  if (state === S.TITLE) { startGame(); return; }
  if (state === S.IDLE) {
    aimStart = { x:e.clientX, y:e.clientY };
    power = 0;
    state = S.AIM;
  } else if (state === S.WAIT || state === S.BITE) {
    pullStart = { x:e.clientX, y:e.clientY };
    pulledThisTouch = false;
  } else if (state === S.CELEBRATE && now > celebrateT + 0.7) {
    celebrateUntil = now; // skip ahead
  } else if (state === S.LEVELUP && now > levelUpT + 0.7) {
    state = S.IDLE;
    setMsg('Cast your new rod!', 3);
  }
});
canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (state === S.AIM && aimStart) {
    const dx = e.clientX - aimStart.x, dy = e.clientY - aimStart.y;
    power = clamp(Math.hypot(dx, dy) / (Math.min(W, H) * 0.42), 0, 1);
  } else if ((state === S.WAIT || state === S.BITE) && pullStart && !pulledThisTouch) {
    if (pullStart.y - e.clientY > 26) {
      pulledThisTouch = true;
      if (state === S.BITE) doCatch(); else prematurePull();
    }
  }
});
function endPointer(e) {
  if (state === S.AIM) {
    if (power > 0.06) doCast();
    else { state = S.IDLE; }
    aimStart = null;
  } else if ((state === S.WAIT || state === S.BITE) && pullStart && !pulledThisTouch) {
    if (pullStart.y - e.clientY > 26) {
      if (state === S.BITE) doCatch(); else prematurePull();
    }
    pullStart = null;
  } else {
    pullStart = null;
  }
}
canvas.addEventListener('pointerup', endPointer);
canvas.addEventListener('pointercancel', endPointer);

/* ---------------- Effects ---------------------------------------- */
function splash(x, y, scale) {
  for (let i = 0; i < 3; i++)
    ripples.push({ x, y, r: 4 + i*6, max: (34 + i*16) * scale, alpha: 0.55 });
}

/* ---------------- Update ----------------------------------------- */
function update(dt) {
  // ambient gulls
  nextGull -= dt;
  if (nextGull <= 0) {
    gulls.push({ x:-40, y:rand(H*0.06, H*0.26), v:rand(28,55), flap:rand(0,6) });
    nextGull = rand(7, 16);
  }
  for (let i = gulls.length-1; i >= 0; i--) {
    const g = gulls[i]; g.x += g.v*dt; g.flap += dt*7;
    if (g.x > W + 60) gulls.splice(i,1);
  }
  // ripples
  for (let i = ripples.length-1; i >= 0; i--) {
    const r = ripples[i]; r.r += 34*dt; r.alpha -= 0.5*dt;
    if (r.r > r.max || r.alpha <= 0) ripples.splice(i,1);
  }
  // sparkles
  for (let i = sparkles.length-1; i >= 0; i--) {
    const s = sparkles[i]; s.x += s.vx*dt; s.y += s.vy*dt; s.vy += 500*dt; s.life -= dt;
    if (s.life <= 0) sparkles.splice(i,1);
  }
  // droplets
  for (let i = drops.length-1; i >= 0; i--) {
    const d = drops[i]; d.x += d.vx*dt; d.y += d.vy*dt; d.vy += 900*dt; d.life -= dt;
    if (d.y > waterY || d.life <= 0) { if (d.y > waterY) splashSmall(d.x); drops.splice(i,1); }
  }
  // fish shadow drifting toward bobber
  if (shadow) {
    if (shadow.flee) {
      shadow.x += shadow.fvx * dt; shadow.y += 20*dt;
      if (shadow.x < -80 || shadow.x > W+80) shadow = null;
    } else {
      shadow.x = lerp(shadow.x, shadow.tx, 1 - Math.pow(0.25, dt));
      shadow.y = lerp(shadow.y, shadow.ty, 1 - Math.pow(0.25, dt));
    }
  }

  if (state === S.FLY) {
    bob.x += bob.vx*dt; bob.y += bob.vy*dt; bob.vy += GRAV*dt;
    if (bob.y >= waterY && bob.vy > 0) landBobber();
  }
  else if (state === S.WAIT) {
    while (events.length && now >= events[0].t) {
      const ev = events.shift();
      if (ev.type === 'nibble') {
        splash(bob.x, waterY, 0.45); sfx.nibble(); buzz(25);
      } else if (ev.type === 'shadow') {
        const side = bob.x > W/2 ? 1 : -1;
        // shadow size telegraphs the fish: sardine ~0.5, yellowfin tuna ~2.0
        const sz = 0.5 + ((pendingFish ? pendingFish.len : 60) - 44) / 86 * 1.5;
        shadow = { x: bob.x + side*rand(130,220), y: waterY + rand(46, 90),
                   tx: bob.x + rand(-8,8), ty: waterY + 34, size: sz,
                   fvx: side * rand(160, 260), flee:false };
      } else if (ev.type === 'bite') {
        startBite();
      }
    }
  }
  else if (state === S.BITE) {
    if (now - biteStart > biteWindow) doMiss();
  }
  else if (state === S.CATCH) {
    if (now - catchT > 0.85) finishCatch();
  }
  else if (state === S.CELEBRATE) {
    if (now > celebrateUntil) {
      hookedFish = null;
      if (pendingLevelUp != null) {
        rodLvl = pendingLevelUp; save.rodLvl = rodLvl; persist();
        pendingLevelUp = null;
        state = S.LEVELUP; levelUpT = now;
        sfx.big(); buzz([40, 60, 40, 60, 120]);
        const colors = ['#ffd166','#f4c531','#fff3c0','#ffe066'];
        for (let i = 0; i < 40; i++) {
          const a = rand(0, Math.PI*2), sp = rand(80, 360);
          sparkles.push({ x:W/2, y:H*0.36, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp-140,
                          life:rand(.9,1.7), color:colors[i%colors.length], r:rand(3,7) });
        }
      } else {
        state = S.IDLE;
        setMsg(castsMade < 3 ? 'Pull back… and let go!' : 'Cast again!', 3);
      }
    }
  }
}
function splashSmall(x) { ripples.push({ x, y: waterY, r: 2, max: 14, alpha: 0.4 }); }

/* ---------------- Drawing ---------------------------------------- */
function skyAndSea() {
  // morning sky
  let g = ctx.createLinearGradient(0, 0, 0, waterY);
  g.addColorStop(0, '#ffe8c2'); g.addColorStop(0.45, '#ffd9a0');
  g.addColorStop(0.8, '#ffc998'); g.addColorStop(1, '#f7b98e');
  ctx.fillStyle = g; ctx.fillRect(0, 0, W, waterY);

  // sun with glow
  const sx = W * 0.76, sy = waterY * 0.42, sr = Math.min(W,H) * 0.075;
  const glow = ctx.createRadialGradient(sx, sy, sr*0.4, sx, sy, sr*3.4);
  glow.addColorStop(0, 'rgba(255,240,200,0.9)');
  glow.addColorStop(1, 'rgba(255,240,200,0)');
  ctx.fillStyle = glow; ctx.fillRect(sx-sr*3.4, sy-sr*3.4, sr*6.8, sr*6.8);
  ctx.fillStyle = '#ffe9b8';
  ctx.beginPath(); ctx.arc(sx, sy, sr, 0, Math.PI*2); ctx.fill();

  // drifting clouds
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  for (let i = 0; i < 3; i++) {
    const cx = ((now * (5 + i*3) + i * 300) % (W + 260)) - 130;
    const cy = H * (0.08 + i * 0.07);
    cloud(cx, cy, 1 - i*0.18);
  }
  // gulls
  ctx.strokeStyle = 'rgba(90,80,70,0.7)'; ctx.lineWidth = 2; ctx.lineCap = 'round';
  for (const gl of gulls) {
    const f = Math.sin(gl.flap) * 4;
    ctx.beginPath();
    ctx.moveTo(gl.x-9, gl.y); ctx.quadraticCurveTo(gl.x-4, gl.y-5-f, gl.x, gl.y);
    ctx.quadraticCurveTo(gl.x+4, gl.y-5-f, gl.x+9, gl.y);
    ctx.stroke();
  }

  // sea
  g = ctx.createLinearGradient(0, waterY, 0, H);
  g.addColorStop(0, '#8fd0cd'); g.addColorStop(0.35, '#5fb2bb'); g.addColorStop(1, '#3d8a9e');
  ctx.fillStyle = g; ctx.fillRect(0, waterY, W, H - waterY);

  // sun path shimmer on water
  const shg = ctx.createLinearGradient(0, waterY, 0, H);
  shg.addColorStop(0, 'rgba(255,235,180,0.5)'); shg.addColorStop(1, 'rgba(255,235,180,0)');
  ctx.fillStyle = shg;
  ctx.beginPath();
  ctx.moveTo(sx - sr*0.9, waterY); ctx.lineTo(sx + sr*0.9, waterY);
  ctx.lineTo(sx + sr*2.6, H); ctx.lineTo(sx - sr*2.6, H);
  ctx.closePath(); ctx.fill();

  // gentle moving glints
  ctx.strokeStyle = 'rgba(255,255,255,0.35)'; ctx.lineWidth = 2;
  for (let i = 0; i < 7; i++) {
    const y = waterY + 14 + i * (H - waterY) / 8;
    const off = Math.sin(now * 0.7 + i * 1.7) * 24;
    const len = 24 + i * 8;
    for (let k = 0; k < 3; k++) {
      const x = ((i * 173 + k * 331 + off + now * 6) % (W + len)) - len/2;
      ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x + len, y); ctx.stroke();
    }
  }
}
function cloud(x, y, s) {
  ctx.beginPath();
  ctx.arc(x, y, 22*s, 0, Math.PI*2);
  ctx.arc(x+24*s, y-8*s, 18*s, 0, Math.PI*2);
  ctx.arc(x+46*s, y, 20*s, 0, Math.PI*2);
  ctx.arc(x+22*s, y+7*s, 20*s, 0, Math.PI*2);
  ctx.fill();
}

function pierAndKid() {
  // posts
  ctx.fillStyle = '#8a6844';
  const posts = [pierEnd - 22, pierEnd * 0.45];
  for (const px of posts) {
    ctx.fillRect(px, deckY, 13, waterY - deckY + 26);
    ctx.fillStyle = 'rgba(60,44,28,0.35)';
    ctx.fillRect(px, waterY, 13, 20); // wet part
    ctx.fillStyle = '#8a6844';
  }
  // deck planks
  ctx.fillStyle = '#b08a5c';
  ctx.fillRect(0, deckY, pierEnd, 16);
  ctx.fillStyle = '#9c7a4e';
  ctx.fillRect(0, deckY + 16, pierEnd, 6);
  ctx.strokeStyle = 'rgba(90,64,38,0.5)'; ctx.lineWidth = 1.5;
  for (let x = 14; x < pierEnd; x += 26) {
    ctx.beginPath(); ctx.moveTo(x, deckY + 2); ctx.lineTo(x, deckY + 14); ctx.stroke();
  }

  // bucket, tucked behind the kid near the shore end
  ctx.fillStyle = '#5f9ea8';
  ctx.beginPath();
  ctx.moveTo(10, deckY); ctx.lineTo(34, deckY); ctx.lineTo(30, deckY - 24); ctx.lineTo(14, deckY - 24);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#487e88'; ctx.fillRect(12, deckY - 25, 20, 4);

  // — the kid —
  const kx = kidX, ky = deckY;
  const bob2 = Math.sin(now * 1.6) * 1.5; // gentle idle sway
  const sway = bob2 * 0.4;
  ctx.save();
  ctx.translate(kx, ky + sway);
  // legs
  ctx.strokeStyle = '#3f6b8a'; ctx.lineWidth = 9; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(-5, -4); ctx.lineTo(-7, 0); ctx.moveTo(5, -4); ctx.lineTo(8, 0); ctx.stroke();
  // body
  ctx.fillStyle = '#f4a259';
  ctx.beginPath();
  ctx.moveTo(-13, -4); ctx.quadraticCurveTo(-15, -38, 0, -40);
  ctx.quadraticCurveTo(15, -38, 13, -4); ctx.closePath(); ctx.fill();
  // head
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath(); ctx.arc(2, -52, 13, 0, Math.PI*2); ctx.fill();
  // cap
  ctx.fillStyle = '#e0574f';
  ctx.beginPath(); ctx.arc(2, -56, 13, Math.PI, 0); ctx.fill();
  ctx.fillRect(2, -58, 19, 5);
  // eye + smile
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(8, -52, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#333'; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.arc(8, -48, 3.4, 0.15, Math.PI - 0.6); ctx.stroke();
  ctx.restore();

  // rod — held at the grip point (rodBase), butt angled down across the body
  const tip = currentRodTip();
  const grip = { x: rodBase.x, y: rodBase.y + sway };
  const dirX = Math.cos(tip.ang), dirY = Math.sin(tip.ang);
  const butt = { x: grip.x - dirX * 24, y: grip.y - dirY * 24 };
  // arms reach from the shoulders to the rod (under the rod)
  ctx.strokeStyle = '#f4a259'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(kx - 4, ky + sway - 28);
  ctx.lineTo(grip.x - dirX * 11, grip.y - dirY * 11);
  ctx.moveTo(kx + 7, ky + sway - 30);
  ctx.lineTo(grip.x, grip.y);
  ctx.stroke();
  // rod — colors and heft come from the current rod level
  const rod = RODS[rodLvl];
  const bendBack = (state === S.AIM) ? power * 26 : (state === S.BITE ? -16 : (state === S.CATCH ? -10 : 0));
  const mx = (grip.x + tip.x)/2 - bendBack * 0.6;
  const my = (grip.y + tip.y)/2 + Math.abs(bendBack) * 0.3;
  ctx.strokeStyle = rod.grip; ctx.lineWidth = rod.width + 2.5;
  ctx.beginPath(); ctx.moveTo(butt.x, butt.y); ctx.lineTo(grip.x, grip.y); ctx.stroke();
  ctx.save();
  ctx.strokeStyle = rodBlankStyle(rod, grip.x, grip.y, tip.x, tip.y);
  if (rod.glow) { ctx.shadowColor = rod.glow; ctx.shadowBlur = 12; }
  ctx.lineWidth = rod.width;
  ctx.beginPath();
  ctx.moveTo(grip.x, grip.y);
  ctx.quadraticCurveTo(mx, my, tip.x, tip.y);
  ctx.stroke();
  ctx.restore();
  // reel hangs just below the grip
  ctx.fillStyle = rod.reel;
  ctx.beginPath(); ctx.arc(grip.x - dirX * 8 + 3, grip.y - dirY * 8 + 8, 4 + rod.width * 0.5, 0, Math.PI*2); ctx.fill();
  // hands gripping over the rod
  ctx.fillStyle = '#ffd9b3';
  ctx.beginPath(); ctx.arc(grip.x, grip.y, 4.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(grip.x - dirX * 11, grip.y - dirY * 11, 4.5, 0, Math.PI*2); ctx.fill();
  return tip;
}

function drawLine(tip) {
  ctx.strokeStyle = RODS[rodLvl].line; ctx.lineWidth = 1.6;
  let end = null;
  if (state === S.FLY || state === S.WAIT || state === S.BITE) {
    let by = bob.y;
    if (state === S.WAIT) by = waterY + Math.sin(now*2.1)*2.5;
    if (state === S.BITE) by = waterY + 10 + Math.sin(now*22)*3;
    end = { x: bob.x, y: by };
    const sag = state === S.FLY ? 6 : 22;
    ctx.beginPath();
    ctx.moveTo(tip.x, tip.y);
    ctx.quadraticCurveTo((tip.x+end.x)/2, Math.max(tip.y, end.y) + sag, end.x, end.y);
    ctx.stroke();
  } else if (state === S.CATCH && hookedFish) {
    const t = ease(clamp((now - catchT) / 0.85, 0, 1));
    const fx = lerp(catchFrom.x, catchTo.x, t);
    const fy = lerp(catchFrom.y, catchTo.y, t) - Math.sin(t*Math.PI) * 60;
    end = { x: fx, y: fy };
    ctx.beginPath(); ctx.moveTo(tip.x, tip.y); ctx.lineTo(fx, fy); ctx.stroke();
    drawFish(hookedFish, fx, fy + hookedFish.len*0.3, 1, -1.35 + t*0.4);
  }
  return end;
}

function drawBobber(pos) {
  if (!pos) return;
  const { x, y } = pos;
  ctx.beginPath(); ctx.arc(x, y, 7.5, 0, Math.PI*2);
  ctx.fillStyle = '#e8564a'; ctx.fill();
  ctx.beginPath(); ctx.arc(x, y, 7.5, Math.PI, 0);
  ctx.fillStyle = '#fff'; ctx.fill();
  ctx.beginPath(); ctx.arc(x-2, y-3, 1.8, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,.9)'; ctx.fill();
  if (state === S.BITE) {
    // urgent "!" bubble
    const by = waterY - 46 + Math.abs(Math.sin(now*7)) * -8;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(x, by, 17, 0, Math.PI*2); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(x-6, by+13); ctx.lineTo(x+6, by+13); ctx.lineTo(x, by+24); ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#e8564a';
    ctx.font = '900 24px system-ui';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('!', x, by+1);
  }
}

function drawShadow() {
  if (!shadow) return;
  ctx.save();
  ctx.globalAlpha = 0.25;
  ctx.fillStyle = '#1d4a58';
  const s = shadow.size;
  ctx.beginPath();
  ctx.ellipse(shadow.x, shadow.y, 34*s, 10*s, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  const dir = shadow.flee ? Math.sign(shadow.fvx) : (shadow.tx > shadow.x ? 1 : -1);
  ctx.moveTo(shadow.x - dir*30*s, shadow.y);
  ctx.lineTo(shadow.x - dir*46*s, shadow.y - 8*s);
  ctx.lineTo(shadow.x - dir*46*s, shadow.y + 8*s);
  ctx.closePath(); ctx.fill();
  ctx.restore();
}

function drawRipples() {
  for (const r of ripples) {
    ctx.strokeStyle = `rgba(255,255,255,${Math.max(0, r.alpha)})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(r.x, r.y, r.r, r.r*0.32, 0, 0, Math.PI*2); ctx.stroke();
  }
}

/* Draws a fish centered at (x,y). scale multiplies its natural size. */
function drawFish(f, x, y, scale, rot) {
  const L = f.len * scale, Hh = f.len * f.hRatio * scale;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot || 0);
  // tail
  ctx.fillStyle = f.back;
  ctx.beginPath();
  ctx.moveTo(-L*0.42, 0);
  ctx.lineTo(-L*0.62, -Hh*0.55);
  ctx.lineTo(-L*0.62, Hh*0.55);
  ctx.closePath(); ctx.fill();
  // body
  ctx.fillStyle = f.body;
  ctx.beginPath(); ctx.ellipse(0, 0, L*0.46, Hh, 0, 0, Math.PI*2); ctx.fill();
  // back shading
  ctx.fillStyle = f.back;
  ctx.beginPath(); ctx.ellipse(0, -Hh*0.34, L*0.44, Hh*0.6, 0, Math.PI, 0); ctx.fill();
  // belly
  ctx.fillStyle = f.belly;
  ctx.beginPath(); ctx.ellipse(0, Hh*0.45, L*0.38, Hh*0.42, 0, 0, Math.PI); ctx.fill();
  // dorsal fin — the marlin gets a tall pointed one
  ctx.fillStyle = f.back;
  ctx.beginPath();
  if (f.pattern === 'marlin') {
    ctx.moveTo(-L*0.08, -Hh*0.75); ctx.lineTo(L*0.06, -Hh*2.1); ctx.lineTo(L*0.2, -Hh*0.7);
  } else {
    ctx.moveTo(-L*0.1, -Hh*0.85); ctx.quadraticCurveTo(L*0.05, -Hh*1.5, L*0.18, -Hh*0.8);
  }
  ctx.closePath(); ctx.fill();
  // the bill, for billfish (drawn outside the body clip)
  if (f.pattern === 'sword' || f.pattern === 'marlin') {
    ctx.fillStyle = f.back;
    ctx.beginPath();
    ctx.moveTo(L*0.4, -Hh*0.22);
    ctx.lineTo(L*0.82, -Hh*0.34);
    ctx.lineTo(L*0.42, Hh*0.02);
    ctx.closePath(); ctx.fill();
  }
  // patterns
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0, 0, L*0.46, Hh, 0, 0, Math.PI*2); ctx.clip();
  if (f.pattern === 'stripes') {
    ctx.strokeStyle = 'rgba(50,60,70,0.55)'; ctx.lineWidth = Math.max(1.5, 2*scale);
    for (let i = -1; i <= 2; i++) {
      ctx.beginPath(); ctx.moveTo(-L*0.45, i*Hh*0.34 - Hh*0.15);
      ctx.lineTo(L*0.45, i*Hh*0.34 - Hh*0.15); ctx.stroke();
    }
  } else if (f.pattern === 'waves') {
    ctx.strokeStyle = 'rgba(20,60,70,0.6)'; ctx.lineWidth = Math.max(1.5, 2*scale);
    for (let i = 0; i < 5; i++) {
      const px = -L*0.35 + i*L*0.16;
      ctx.beginPath(); ctx.moveTo(px, -Hh*0.9);
      ctx.quadraticCurveTo(px + L*0.06, -Hh*0.4, px, -Hh*0.05); ctx.stroke();
    }
  } else if (f.pattern === 'bars') {
    ctx.fillStyle = 'rgba(120,110,60,0.25)';
    for (let i = 0; i < 4; i++) {
      ctx.fillRect(-L*0.3 + i*L*0.17, -Hh, L*0.06, Hh*1.6);
    }
  } else if (f.pattern === 'dots') {
    ctx.fillStyle = 'rgba(40,60,90,0.5)';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); ctx.arc(-L*0.3 + i*L*0.14, -Hh*0.3, 1.6*scale, 0, Math.PI*2); ctx.fill();
    }
  } else if (f.pattern === 'opal') {
    ctx.fillStyle = 'rgba(245,250,240,0.85)';
    ctx.beginPath(); ctx.arc(L*0.05, -Hh*0.55, Hh*0.22, 0, Math.PI*2); ctx.fill();
  } else if (f.pattern === 'mahi') {
    ctx.fillStyle = 'rgba(40,90,60,0.45)';
    for (let i = 0; i < 10; i++) {
      ctx.beginPath();
      ctx.arc(-L*0.36 + (i%5)*L*0.16, -Hh*0.5 + Math.floor(i/5)*Hh*0.5, 1.7*scale, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (f.pattern === 'marlin' || f.pattern === 'sword') {
    ctx.strokeStyle = 'rgba(200,225,245,0.45)'; ctx.lineWidth = Math.max(1.5, 2*scale);
    for (let i = 0; i < 5; i++) {
      const px = -L*0.3 + i*L*0.14;
      ctx.beginPath(); ctx.moveTo(px, -Hh*0.85); ctx.lineTo(px - L*0.03, Hh*0.5); ctx.stroke();
    }
  } else if (f.pattern === 'tuna') {
    ctx.strokeStyle = 'rgba(244,196,48,0.95)'; ctx.lineWidth = Math.max(2, 2.6*scale);
    ctx.beginPath();
    ctx.moveTo(-L*0.42, Hh*0.08);
    ctx.quadraticCurveTo(0, -Hh*0.12, L*0.42, Hh*0.02);
    ctx.stroke();
  } else if (f.pattern === 'salmon') {
    ctx.fillStyle = 'rgba(60,70,85,0.35)';
    for (let i = 0; i < 7; i++) {
      ctx.beginPath();
      ctx.arc(-L*0.35 + i*L*0.11, -Hh*0.45 + (i%2)*Hh*0.2, 1.8*scale, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
  // eye
  ctx.fillStyle = '#20303c';
  ctx.beginPath(); ctx.arc(L*0.3, -Hh*0.18, Math.max(2, Hh*0.16), 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(L*0.31, -Hh*0.22, Math.max(0.8, Hh*0.06), 0, Math.PI*2); ctx.fill();
  // smile — every fish here is friendly
  ctx.strokeStyle = 'rgba(30,45,55,0.7)'; ctx.lineWidth = Math.max(1.2, 1.5*scale);
  ctx.beginPath(); ctx.arc(L*0.34, Hh*0.1, Hh*0.18, 0.3, Math.PI*0.75); ctx.stroke();
  ctx.restore();
}

function drawAimHelpers(tip) {
  if (state !== S.AIM || power <= 0.02) return;
  // trajectory preview dots
  const minCast = 70, maxCastAbs = W - tip.x - 26;
  const maxCast = minCast + (maxCastAbs - minCast) * RODS[rodLvl].cap;
  const dist = lerp(minCast, maxCast, power);
  const T = 0.85 + 0.4 * power;
  const vx = dist / T;
  const vy = ((waterY - tip.y) - 0.5*GRAV*T*T) / T;
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (let i = 1; i <= 9; i++) {
    const t = (i/10) * T;
    const px = tip.x + vx*t;
    const py = tip.y + vy*t + 0.5*GRAV*t*t;
    if (py > waterY) break;
    ctx.globalAlpha = 1 - i*0.08;
    ctx.beginPath(); ctx.arc(px, py, 4.5 - i*0.25, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  // power arc
  const cx = rodBase.x, cy = rodBase.y;
  ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.beginPath(); ctx.arc(cx, cy, 42, -Math.PI*0.9, -Math.PI*0.1); ctx.stroke();
  const hue = 120 - power*90;
  ctx.strokeStyle = `hsl(${hue}, 75%, 55%)`;
  ctx.beginPath(); ctx.arc(cx, cy, 42, -Math.PI*0.9, -Math.PI*0.9 + power*Math.PI*0.8); ctx.stroke();
}

function drawIdleHint() {
  if (state !== S.IDLE || castsMade > 2) return;
  // ghost hand pulling back and releasing, looped
  const t = (now % 2.2) / 2.2;
  const hx = rodBase.x + 60, hy = deckY - 90;
  let ox = 0, oy = 0, alpha = 0.9;
  if (t < 0.55) { const p = t/0.55; ox = -p*46; oy = p*60; }
  else if (t < 0.7) { alpha = 0.9 - (t-0.55)/0.15*0.9; ox = -46; oy = 60; }
  else alpha = 0;
  if (alpha > 0.02) {
    ctx.save(); ctx.globalAlpha = alpha;
    ctx.font = '34px system-ui'; ctx.textAlign = 'center';
    ctx.fillText('👆', hx + ox, hy + oy);
    ctx.restore();
  }
}

function drawCelebrate() {
  if (state !== S.CELEBRATE || !hookedFish) return;
  const t = clamp((now - celebrateT) / 0.35, 0, 1);
  const s = ease(t);
  const superRare = hookedFish.pts > 100;
  const cw = Math.min(W * 0.84, 360), ch = superRare ? 258 : 240;
  const cx = W/2, cy = H*0.34;
  ctx.save();
  ctx.translate(cx, cy); ctx.scale(s, s);
  // card
  ctx.fillStyle = 'rgba(255,250,240,0.96)';
  ctx.strokeStyle = '#ffd166'; ctx.lineWidth = 5;
  roundRect(-cw/2, -ch/2, cw, ch, 24); ctx.fill(); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  let y = -ch/2;
  if (superRare) {
    ctx.fillStyle = '#e8a020';
    ctx.font = '900 21px ui-rounded, system-ui';
    ctx.fillText('✨ SUPER RARE! ✨', 0, y + 28);
    y += 20;
  }
  // fish (big and bouncy)
  const wob = Math.sin(now*5) * 0.06;
  drawFish(hookedFish, 0, y + 78, Math.min(2.2, cw*0.5/hookedFish.len), wob);
  // caption + name on separate lines; name shrinks until it fits the card
  ctx.fillStyle = '#2b5876';
  ctx.font = '800 19px ui-rounded, system-ui';
  ctx.fillText('You caught a', 0, y + 142);
  const name = `${hookedFish.name}!`;
  let px = 31;
  do {
    ctx.font = `900 ${px}px ui-rounded, system-ui`;
    px--;
  } while (px > 16 && ctx.measureText(name).width > cw - 36);
  ctx.fillText(name, 0, y + 174);
  ctx.fillStyle = '#e8944a';
  ctx.font = '900 32px ui-rounded, system-ui';
  ctx.fillText(`+${hookedFish.pts} ⭐`, 0, y + 212);
  ctx.restore();
}

function drawSparkles() {
  for (const sp of sparkles) {
    ctx.globalAlpha = clamp(sp.life, 0, 1);
    ctx.fillStyle = sp.color;
    ctx.beginPath(); ctx.arc(sp.x, sp.y, sp.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* Blank color for a rod — a slowly-shifting rainbow gradient for the
   legend rod, a plain color for everything else. */
function rodBlankStyle(rod, x1, y1, x2, y2) {
  if (!rod.rainbow) return rod.blank;
  const g = ctx.createLinearGradient(x1, y1, x2, y2);
  const shift = (now * 30) % 360;
  for (let i = 0; i <= 4; i++) g.addColorStop(i/4, `hsl(${(shift + i*72) % 360}, 85%, 60%)`);
  return g;
}

/* A little portrait of a rod, used on the level-up card. */
function drawRodIcon(rod, cx, cy, L) {
  const ang = -0.5, dx = Math.cos(ang), dy = Math.sin(ang);
  const bx = cx - dx*L/2, by = cy - dy*L/2;
  const tx = cx + dx*L/2, ty = cy + dy*L/2;
  ctx.lineCap = 'round';
  ctx.strokeStyle = rod.grip; ctx.lineWidth = rod.width + 6;
  ctx.beginPath(); ctx.moveTo(bx, by); ctx.lineTo(bx + dx*L*0.2, by + dy*L*0.2); ctx.stroke();
  ctx.save();
  ctx.strokeStyle = rodBlankStyle(rod, bx, by, tx, ty);
  if (rod.glow) { ctx.shadowColor = rod.glow; ctx.shadowBlur = 14; }
  ctx.lineWidth = rod.width + 1;
  ctx.beginPath(); ctx.moveTo(bx + dx*L*0.18, by + dy*L*0.18); ctx.lineTo(tx, ty); ctx.stroke();
  ctx.restore();
  ctx.fillStyle = rod.reel;
  ctx.beginPath(); ctx.arc(bx + dx*L*0.28 + 4, by + dy*L*0.28 + 10, rod.width + 5, 0, Math.PI*2); ctx.fill();
  // a little line dangling from the tip
  ctx.strokeStyle = rod.line; ctx.lineWidth = 1.6;
  ctx.beginPath(); ctx.moveTo(tx, ty); ctx.quadraticCurveTo(tx + 8, ty + 20, tx + 3, ty + 38); ctx.stroke();
}

function drawLevelUp() {
  if (state !== S.LEVELUP) return;
  const rod = RODS[rodLvl];
  const t = clamp((now - levelUpT) / 0.4, 0, 1);
  const s = ease(t);
  ctx.fillStyle = 'rgba(20,60,80,0.35)';
  ctx.fillRect(0, 0, W, H);
  const cw = Math.min(W * 0.86, 370), ch = 264;
  ctx.save();
  ctx.translate(W/2, H * 0.38); ctx.scale(s, s);
  ctx.fillStyle = 'rgba(255,250,240,0.97)';
  ctx.strokeStyle = '#f4c531'; ctx.lineWidth = 6;
  roundRect(-cw/2, -ch/2, cw, ch, 26); ctx.fill(); ctx.stroke();
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillStyle = '#e8a020';
  ctx.font = '900 30px ui-rounded, system-ui';
  ctx.fillText('✨ NEW ROD! ✨', 0, -ch/2 + 34);
  const wob = Math.sin(now * 4) * 3;
  drawRodIcon(rod, 0, -14 + wob, cw * 0.52);
  ctx.fillStyle = '#2b5876';
  const name = rod.name;
  let px = 27;
  do { ctx.font = `900 ${px}px ui-rounded, system-ui`; px--; }
  while (px > 15 && ctx.measureText(name).width > cw - 36);
  ctx.fillText(name, 0, 58);
  ctx.fillStyle = '#7a8a96';
  ctx.font = '700 15px ui-rounded, system-ui';
  ctx.fillText(`Just like ${rod.real}!`, 0, 86);
  const pulse = 1 + Math.sin(now * 5) * 0.04;
  ctx.save(); ctx.scale(pulse, pulse);
  ctx.fillStyle = '#e8564a';
  ctx.font = '900 18px ui-rounded, system-ui';
  ctx.fillText('Tap to go fishing!', 0, (ch/2 - 24) / pulse);
  ctx.restore();
  ctx.restore();
}
function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.arcTo(x+w, y, x+w, y+h, r);
  ctx.arcTo(x+w, y+h, x, y+h, r);
  ctx.arcTo(x, y+h, x, y, r);
  ctx.arcTo(x, y, x+w, y, r);
  ctx.closePath();
}

function drawMsg() {
  if (!msg || now > msg.until) return;
  const remain = msg.until - now;
  const alpha = clamp(remain / 0.4, 0, 1);
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  const y = H * 0.8;
  const size = msg.big ? 40 : 24;
  const bounce = msg.big ? Math.sin(now*9)*4 : 0;
  ctx.font = `900 ${size}px ui-rounded, system-ui`;
  ctx.lineWidth = 7; ctx.lineJoin = 'round';
  ctx.strokeStyle = 'rgba(30,70,90,0.85)';
  ctx.strokeText(msg.text, W/2, y + bounce);
  ctx.fillStyle = msg.big ? '#ffe066' : '#ffffff';
  ctx.fillText(msg.text, W/2, y + bounce);
  ctx.restore();
}

function drawDrops() {
  ctx.fillStyle = 'rgba(190,235,240,0.85)';
  for (const d of drops) {
    ctx.beginPath(); ctx.arc(d.x, d.y, 3, 0, Math.PI*2); ctx.fill();
  }
}

/* ---------------- Main loop -------------------------------------- */
function frame(ts) {
  now = ts / 1000;
  const dt = Math.min(0.05, now - (last || now));
  last = now;
  if (state !== S.TITLE) update(dt);

  skyAndSea();
  drawShadow();
  drawRipples();
  const tip = pierAndKid();
  const lineEnd = drawLine(tip);
  if (state === S.FLY || state === S.WAIT || state === S.BITE) drawBobber(lineEnd);
  drawDrops();
  drawAimHelpers(tip);
  drawIdleHint();
  drawCelebrate();
  drawLevelUp();
  drawSparkles();
  drawMsg();

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
