name: Publish to GitHub Pages

# The Pages site serves the gh-pages branch; this syncs the games to it
# on every push to master.
on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Push site content to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan deploy
          git rm -rq --cached .
          git add index.html maddies-gymnastics-game ryans-fishing-game
          git commit -m "Publish site from ${GITHUB_SHA}"
          git push -f origin deploy:gh-pages
